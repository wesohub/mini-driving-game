// ==================== GAME LOGIC ====================
function startGame() {
    gameState = 'loading';
    loadingProgress = 0;
    loadingStartTime = performance.now();
    showExitConfirm = false;
    
    // Use setTimeout to allow loading screen to render
    setTimeout(function() {
        loadingProgress = 0.2;
    }, 50);
    
    setTimeout(function() {
        trackNodes = generateSprintTrack();
        loadingProgress = 0.4;
    }, 100);
    
    setTimeout(function() {
        trackPath = buildTrackPath(trackNodes, false);
        let edges = buildEdges(trackPath);
        trackLeftEdge = edges.left;
        trackRightEdge = edges.right;
        loadingProgress = 0.5;
    }, 150);
    
    setTimeout(function() {
        buildTrackGrid();
        generateBranches();
        buildBranchGrid();
        loadingProgress = 0.6;
    }, 200);
    
    setTimeout(function() {
        selfIntersectionZones = detectSelfIntersections(trackPath.length);
        trackWalls = generateWalls(trackPath.length);
        loadingProgress = 0.7;
    }, 250);
    
    setTimeout(function() {
        generateScenery();
        computeMinimapBounds();
        prerenderMinimapTrack();
        buildWebGLTrackData();
        loadingProgress = 0.85;
    }, 300);
    
    setTimeout(function() {
        placeCars();
        initParticlePool();
        totalDistance = 0;
        raceTime = 0;
        finalRaceTime = 0;
        finalDistance = 0;
        raceFinished = false;
        finishLineCrossed = false;
        finishSoundsStopped = false;
        finishResultsShown = false;
        countdownTimer = 0;
        countdownNumber = 3;
        lastCountdownBeep = -1;
        camera.swayOffset = 0;
        loadingProgress = 1.0;
        
        setTimeout(function() {
            gameState = 'countdown';
        }, 200);
    }, 350);
}

function continueDriving() {
    stopGameSounds();
    finishResultsShown = false;
    startGame();
}

// ==================== MAIN UPDATE ====================
function update(dt) {
    if (gameState === 'countdown') {
        countdownTimer += dt;
        // Play beep on each new number
        if (countdownNumber >= 1 && countdownNumber !== lastCountdownBeep) {
            lastCountdownBeep = countdownNumber;
            playCountdownBeep(false);
        }
        if (countdownNumber === 0 && lastCountdownBeep !== 0) {
            lastCountdownBeep = 0;
            playCountdownBeep(true); // GO sound
        }
        if (countdownTimer >= 1) {
            countdownTimer -= 1;
            countdownNumber--;
            if (countdownNumber < -1) {
                gameState = 'racing';
                PerfMonitor.startSession();
            }
        }
        updateCamera();
        return;
    }

    if (gameState !== 'racing') return;

    raceTime += dt;

    // Update player
    if (player) {
        updatePlayer(player, dt);
    }

    // Single pass through cars for all NPC updates and collision checks
    let playerX = player ? player.x : 0;
    let playerY = player ? player.y : 0;
    let activeDist = NPC_ACTIVE_DISTANCE;
    let activeDistSq = activeDist * activeDist;

    for (let car of cars) {
        if (car.isPlayer) {
            // Player collision checks
            checkWallCollision(car);
            checkSceneryCollision(car);
            continue;
        }

        // NPC: compute distance to player once
        let dx = car.x - playerX;
        let dy = car.y - playerY;
        let distSq = dx * dx + dy * dy;
        let isPlayerNearby = distSq < activeDistSq;

        // Update NPC
        updateNPC(car, dt, isPlayerNearby);

        // Collision checks only for nearby NPCs
        if (isPlayerNearby) {
            checkWallCollision(car);
            checkSceneryCollision(car);
        }

        // Track boundary for all NPCs
        enforceTrackBoundary(car);

        // Update NPC engine sounds
        if (NPC_AUDIO_ENABLED && car.active !== false) {
            updateNPCEngineSound(car, player);
        }
    }

    // Car-to-car collisions - direct iteration without creating new array
    if (cars.length > 1 && player) {
        for (let i = 0; i < cars.length; i++) {
            let a = cars[i];
            let aIsNear = a.isPlayer || ((a.x - playerX) ** 2 + (a.y - playerY) ** 2 < activeDistSq);
            if (!aIsNear) continue;
            
            for (let j = i + 1; j < cars.length; j++) {
                let b = cars[j];
                let bIsNear = b.isPlayer || ((b.x - playerX) ** 2 + (b.y - playerY) ** 2 < activeDistSq);
                if (!bIsNear) continue;
                
                let dx = b.x - a.x;
                let dy = b.y - a.y;
                let d = Math.sqrt(dx * dx + dy * dy);
                let minDist = (CAR_WIDTH + CAR_LENGTH) / 2 * 0.7;

                if (d < minDist && d > 0.01) {
                    let nx = dx / d;
                    let ny = dy / d;

                    // Strong separation - always push apart enough to prevent sticking
                    let overlap = minDist - d;
                    let pushStrength = Math.max(overlap * 0.6, 2);
                    a.x -= nx * pushStrength;
                    a.y -= ny * pushStrength;
                    b.x += nx * pushStrength;
                    b.y += ny * pushStrength;

                    let avx = Math.cos(a.direction) * a.speed;
                    let avy = Math.sin(a.direction) * a.speed;
                    let bvx = Math.cos(b.direction) * b.speed;
                    let bvy = Math.sin(b.direction) * b.speed;

                    let aDotN = avx * nx + avy * ny;
                    let bDotN = bvx * nx + bvy * ny;

                    // Always resolve - even if not approaching, push apart to unstick
                    let relVel = aDotN - bDotN;
                    if (relVel > -0.5) { // resolve if approaching OR nearly stationary
                        let restitution = 0.6; // bouncier
                        let impulse = (1 + restitution) * Math.max(relVel, 0.5) / 2;
                        impulse = clamp(impulse, 1.0, 4.0); // minimum bounce impulse

                        avx -= impulse * nx;
                        avy -= impulse * ny;
                        bvx += impulse * nx;
                        bvy += impulse * ny;

                        let newDirA = Math.atan2(avy, avx);
                        let newDirB = Math.atan2(bvy, bvx);
                        let newSpeedA = Math.sqrt(avx * avx + avy * avy);
                        let newSpeedB = Math.sqrt(bvx * bvx + bvy * bvy);

                        // Blend direction more aggressively for visible bounce
                        let blendFactor = 0.7;
                        a.direction = a.direction + angleDiff(a.direction, newDirA) * blendFactor;
                        b.direction = b.direction + angleDiff(b.direction, newDirB) * blendFactor;
                        a.direction = normalizeAngle(a.direction);
                        b.direction = normalizeAngle(b.direction);

                        // Ensure minimum speed after collision so cars don't stop
                        let minBounceSpeed = 2.0;
                        a.speed = lerp(Math.abs(a.speed), newSpeedA, 0.6) * (a.speed >= 0 ? 1 : -1);
                        b.speed = lerp(Math.abs(b.speed), newSpeedB, 0.6) * (b.speed >= 0 ? 1 : -1);
                        a.speed *= 0.85;
                        b.speed *= 0.85;
                        if (Math.abs(a.speed) < minBounceSpeed) a.speed = minBounceSpeed * (a.speed >= 0 ? 1 : -1);
                        if (Math.abs(b.speed) < minBounceSpeed) b.speed = minBounceSpeed * (b.speed >= 0 ? 1 : -1);
                        a.collisionPenalty = 0.4;
                        b.collisionPenalty = 0.4;

                        a.speed = clamp(a.speed, -a.maxSpeed, a.maxSpeed);
                        b.speed = clamp(b.speed, -b.maxSpeed, b.maxSpeed);

                        if (a.collisionCooldown <= 0 && b.collisionCooldown <= 0) {
                            let collisionDist = Math.sqrt((a.x - playerX) ** 2 + (a.y - playerY) ** 2);
                            if (collisionDist < 500) {
                                playCollisionSound();
                            }
                            a.collisionCooldown = 0.1;
                            b.collisionCooldown = 0.1;
                        }

                        let cx = (a.x + b.x) / 2;
                        let cy = (a.y + b.y) / 2;
                        let maxSparks = Math.min(4, MAX_SPARKS - particleCounts.spark);
                        for (let s = 0; s < maxSparks; s++) {
                            spawnSpark(cx, cy);
                        }
                    }
                }
            }
        }
    }

    // Finish line
    checkFinishLine();
    updateFinishState();
    checkRaceEnd();

    // Particles
    updateParticles();

    // Dynamic NPC spawning/despawning
    updateNPCSpawning();

    // Camera
    updateCamera();
}

// ==================== RENDER ====================
function render() {
    ctx.clearRect(0, 0, W, H);

    if (gameState === 'menu') {
        drawMenu();
        return;
    }
    
    if (gameState === 'loading') {
        drawLoading();
        return;
    }

    // Game rendering
    renderWebGL();
    drawScenery();

    // Start/finish lines (still using Canvas for checkerboard pattern)
    drawStartFinishLine(0);
    drawStartFinishLine(trackPath.length - 1);

    // Draw particles behind cars
    drawParticles();

    // Sort cars by screen Y for depth - use in-place sort with pre-allocated array
    // Only sort if cars array changed (optimization)
    if (!window.sortedCars || window.sortedCars.length !== cars.length) {
        window.sortedCars = [...cars];
    }
    // Update references in case cars array changed
    for (let i = 0; i < cars.length; i++) {
        window.sortedCars[i] = cars[i];
    }
    window.sortedCars.sort((a, b) => {
        let dax = a.x - camera.x, day = a.y - camera.y;
        let dbx = b.x - camera.x, dby = b.y - camera.y;
        let say = H * 0.6 + (dax * cameraTransform.sin + day * cameraTransform.cos) * VIEW_SCALE;
        let sby = H * 0.6 + (dbx * cameraTransform.sin + dby * cameraTransform.cos) * VIEW_SCALE;
        return say - sby;
    });
    for (let car of window.sortedCars) {
        drawCar(car);
    }

    // HUD
    drawHUD();
    drawMinimap();

    if (gameState === 'countdown') {
        drawCountdown();
    }

    if (gameState === 'results' || finishResultsShown) {
        drawResults();
    }

    if (showExitConfirm) {
        drawExitConfirm();
    }
}

function drawExitConfirm() {
    // Dark overlay
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(0, 0, W, H);

    // Dialog box
    let boxW = 280;
    let boxH = 140;
    let boxX = W / 2 - boxW / 2;
    let boxY = H / 2 - boxH / 2;

    ctx.fillStyle = 'rgba(30,30,45,0.95)';
    ctx.strokeStyle = 'rgba(255,255,255,0.2)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    roundRect(ctx, boxX, boxY, boxW, boxH, 12);
    ctx.fill();
    ctx.stroke();

    // Title
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 18px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('结束当前比赛?', W / 2, boxY + 35);

    // Buttons
    let btnW = 100, btnH = 40;
    let btnY = boxY + boxH - 55;
    let btn1X = W / 2 - btnW - 15;
    let btn2X = W / 2 + 15;

    // Cancel button
    ctx.fillStyle = 'rgba(255,255,255,0.1)';
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.beginPath();
    roundRect(ctx, btn1X, btnY, btnW, btnH, 8);
    ctx.fill();
    ctx.stroke();
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 14px sans-serif';
    ctx.fillText('取消', btn1X + btnW / 2, btnY + btnH / 2);

    // Confirm button
    ctx.fillStyle = 'rgba(231,76,60,0.3)';
    ctx.strokeStyle = 'rgba(231,76,60,0.8)';
    ctx.beginPath();
    roundRect(ctx, btn2X, btnY, btnW, btnH, 8);
    ctx.fill();
    ctx.stroke();
    ctx.fillStyle = '#e74c3c';
    ctx.fillText('结束', btn2X + btnW / 2, btnY + btnH / 2);
    
    ctx.textBaseline = 'alphabetic';
}

// ==================== GAME LOOP ====================
let lastTime = 0;
let accumulator = 0;
const FIXED_DT = 1 / 60;

function gameLoop(timestamp) {
    if (lastTime === 0) lastTime = timestamp;
    let elapsed = (timestamp - lastTime) / 1000;
    lastTime = timestamp;

    // Cap delta to prevent spiral of death
    if (elapsed > 0.1) elapsed = 0.1;

    let updateStart = performance.now();
    accumulator += elapsed;
    while (accumulator >= FIXED_DT) {
        update(FIXED_DT);
        accumulator -= FIXED_DT;
    }
    let updateTime = performance.now() - updateStart;

    let renderStart = performance.now();
    render();
    let renderTime = performance.now() - renderStart;

    requestAnimationFrame(gameLoop);
}

// ==================== INIT ====================
function init() {
    resize();
    initMenuParticles();
    requestAnimationFrame(gameLoop);
}

init();

</script>
