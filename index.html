// roundRect polyfill
if (!CanvasRenderingContext2D.prototype.roundRect) {
    CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
        if (typeof r === 'number') r = [r, r, r, r];
        if (!Array.isArray(r)) r = [r, r, r, r];
        const [tl, tr, br, bl] = r;
        this.moveTo(x + tl, y);
        this.lineTo(x + w - tr, y);
        this.quadraticCurveTo(x + w, y, x + w, y + tr);
        this.lineTo(x + w, y + h - br);
        this.quadraticCurveTo(x + w, y + h, x + w - br, y + h);
        this.lineTo(x + bl, y + h);
        this.quadraticCurveTo(x, y + h, x, y + h - bl);
        this.lineTo(x, y + tl);
        this.quadraticCurveTo(x, y, x + tl, y);
        this.closePath();
    };
}
// ==================== CONSTANTS ====================

// Vertex shader
const vertexShaderSource = `
    attribute vec2 a_position;
    attribute vec4 a_color;
    uniform vec2 u_resolution;
    uniform vec2 u_camera;
    uniform float u_scale;
    uniform float u_cos;
    uniform float u_sin;
    uniform float u_sway;
    uniform vec2 u_offset;
    varying vec4 v_color;

    void main() {
        vec2 pos = a_position - u_camera;
        vec2 rotated;
        rotated.x = pos.x * u_cos - pos.y * u_sin;
        rotated.y = pos.x * u_sin + pos.y * u_cos;
        vec2 screenPos = rotated * u_scale + vec2(u_sway, 0.0) + u_offset;
        vec2 clipSpace = (screenPos / u_resolution) * 2.0 - 1.0;
        clipSpace.y = -clipSpace.y; // Flip Y axis for WebGL (Canvas Y is down, WebGL Y is up)
        gl_Position = vec4(clipSpace, 0.0, 1.0);
        v_color = a_color;
    }
`;

// Fragment shader
const fragmentShaderSource = `
    precision mediump float;
    varying vec4 v_color;

    void main() {
        gl_FragColor = v_color;
    }
`;

function createShader(gl, type, source) {
    const shader = gl.createShader(type);
    gl.shaderSource(shader, source);
    gl.compileShader(shader);
    if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
        console.error('Shader compile error:', gl.getShaderInfoLog(shader));
        gl.deleteShader(shader);
        return null;
    }
    return shader;
}

function createProgram(gl, vertexShader, fragmentShader) {
    const program = gl.createProgram();
    gl.attachShader(program, vertexShader);
    gl.attachShader(program, fragmentShader);
    gl.linkProgram(program);
    if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
        console.error('Program link error:', gl.getProgramInfoLog(program));
        gl.deleteProgram(program);
        return null;
    }
    return program;
}

const vertexShader = createShader(gl, gl.VERTEX_SHADER, vertexShaderSource);
const fragmentShader = createShader(gl, gl.FRAGMENT_SHADER, fragmentShaderSource);
const webglProgram = createProgram(gl, vertexShader, fragmentShader);

const positionLocation = gl.getAttribLocation(webglProgram, 'a_position');
const colorLocation = gl.getAttribLocation(webglProgram, 'a_color');
const resolutionLocation = gl.getUniformLocation(webglProgram, 'u_resolution');
const cameraLocation = gl.getUniformLocation(webglProgram, 'u_camera');
const scaleLocation = gl.getUniformLocation(webglProgram, 'u_scale');
const cosLocation = gl.getUniformLocation(webglProgram, 'u_cos');
const sinLocation = gl.getUniformLocation(webglProgram, 'u_sin');
const swayLocation = gl.getUniformLocation(webglProgram, 'u_sway');
const offsetLocation = gl.getUniformLocation(webglProgram, 'u_offset');

const positionBuffer = gl.createBuffer();

// WebGL buffers for different road elements
let trackSurfacePositions = [];
let trackSurfaceColors = [];
let branchSurfacePositions = [];
let branchSurfaceColors = [];

let edgeColors = [];
let centerLinePositions = [];

function hexToRgb(hex) {
    const r = parseInt(hex.slice(1, 3), 16) / 255;
    const g = parseInt(hex.slice(3, 5), 16) / 255;
    const b = parseInt(hex.slice(5, 7), 16) / 255;
    return [r, g, b, 1.0];
}

function rgbaToRgb(rgba) {
    const match = rgba.match(/rgba?\((\d+),\s*(\d+),\s*(\d+)(?:,\s*([\d.]+))?\)/);
    if (match) {
        return [
            parseInt(match[1]) / 255,
            parseInt(match[2]) / 255,
            parseInt(match[3]) / 255,
            match[4] ? parseFloat(match[4]) : 1.0
        ];
    }
    return [1, 1, 1, 1];
}

// ==================== WEBGL DATA BUILDING ====================
function buildWebGLTrackData() {
    trackSurfacePositions = [];
    trackSurfaceColors = [];
    branchSurfacePositions = [];
    branchSurfaceColors = [];
    edgePositions = [];
    edgeColors = [];
    centerLinePositions = [];
    centerLineColors = [];
    wallPositions = [];
    wallColors = [];
    
    buildTrackSurface();
    buildBranchSurfaces();
    buildRoadEdges();
    buildCenterLine();
    buildWalls();
}

function buildTrackSurface() {
    const color = hexToRgb(COLORS.trackSurface);
    
    // Main visible range
    const vStart = 0;
    const vEnd = trackLeftEdge.length - 1;
    
    if (vEnd > vStart) {
        // Use TRIANGLE_STRIP: L0, R0, L1, R1, L2, R2, L3, R3...
        // This creates proper quads: (L0,R0,L1), (R0,L1,R1), (L1,R1,L2), (R1,L2,R2)...
        for (let i = vStart; i < vEnd; i++) {
            trackSurfacePositions.push(
                trackLeftEdge[i].x, trackLeftEdge[i].y,
                trackRightEdge[i].x, trackRightEdge[i].y
            );
            trackSurfaceColors.push(...color, ...color);
        }
    }
}

function buildBranchSurfaces() {
    const color = hexToRgb(COLORS.branchSurface);
    
    for (let bp of branchPaths) {
        const skipStart = Math.min(3, Math.floor(bp.path.length * 0.05));
        const skipEnd = Math.min(3, Math.floor(bp.path.length * 0.05));
        
        if (bp.leftEdge.length - skipStart - skipEnd < 2) continue;
        
        // Use TRIANGLES for branch surfaces to avoid TRIANGLE_STRIP issues
        const vStart = skipStart;
        const vEnd = bp.leftEdge.length - skipEnd - 1;
        
        if (vEnd > vStart) {
            for (let i = vStart; i < vEnd; i++) {
                const wp1 = bp.leftEdge[i];
                const wp2 = bp.leftEdge[i + 1];
                const wp3 = bp.rightEdge[i + 1];
                const wp4 = bp.rightEdge[i];
                
                branchSurfacePositions.push(
                    wp1.x, wp1.y,
                    wp2.x, wp2.y,
                    wp3.x, wp3.y,
                    wp1.x, wp1.y,
                    wp3.x, wp3.y,
                    wp4.x, wp4.y
                );
                
                for (let j = 0; j < 6; j++) {
                    branchSurfaceColors.push(...color);
                }
            }
        }
    }
}

function buildRoadEdges() {
    const color = hexToRgb(COLORS.trackEdge);
    const edgeThickness = 4;
    
    // Main track edges - draw as triangles for thicker lines
    for (let i = 0; i < trackLeftEdge.length - 1; i++) {
        const wp1 = trackLeftEdge[i];
        const wp2 = trackLeftEdge[i + 1];
        
        // Calculate perpendicular direction for thickness
        const dx = wp2.x - wp1.x;
        const dy = wp2.y - wp1.y;
        const len = Math.sqrt(dx * dx + dy * dy);
        const nx = -dy / len;
        const ny = dx / len;
        
        // Create thick line as 2 triangles
        const halfThick = edgeThickness;
        const p1x = wp1.x + nx * halfThick;
        const p1y = wp1.y + ny * halfThick;
        const p2x = wp1.x - nx * halfThick;
        const p2y = wp1.y - ny * halfThick;
        const p3x = wp2.x - nx * halfThick;
        const p3y = wp2.y - ny * halfThick;
        const p4x = wp2.x + nx * halfThick;
        const p4y = wp2.y + ny * halfThick;
        
        edgePositions.push(
            p1x, p1y,
            p2x, p2y,
            p3x, p3y,
            p1x, p1y,
            p3x, p3y,
            p4x, p4y
        );
        
        for (let j = 0; j < 6; j++) {
            edgeColors.push(...color);
        }
    }
    
    for (let i = 0; i < trackRightEdge.length - 1; i++) {
        const wp1 = trackRightEdge[i];
        const wp2 = trackRightEdge[i + 1];
        
        // Calculate perpendicular direction for thickness
        const dx = wp2.x - wp1.x;
        const dy = wp2.y - wp1.y;
        const len = Math.sqrt(dx * dx + dy * dy);
        const nx = -dy / len;
        const ny = dx / len;
        
        // Create thick line as 2 triangles
        const halfThick = edgeThickness;
        const p1x = wp1.x + nx * halfThick;
        const p1y = wp1.y + ny * halfThick;
        const p2x = wp1.x - nx * halfThick;
        const p2y = wp1.y - ny * halfThick;
        const p3x = wp2.x - nx * halfThick;
        const p3y = wp2.y - ny * halfThick;
        const p4x = wp2.x + nx * halfThick;
        const p4y = wp2.y + ny * halfThick;
        
        edgePositions.push(
            p1x, p1y,
            p2x, p2y,
            p3x, p3y,
            p1x, p1y,
            p3x, p3y,
            p4x, p4y
        );
        
        for (let j = 0; j < 6; j++) {
            edgeColors.push(...color);
        }
    }
    
    // Branch edges
    for (let bp of branchPaths) {
        const skipStart = Math.min(3, Math.floor(bp.path.length * 0.05));
        const skipEnd = Math.min(3, Math.floor(bp.path.length * 0.05));
        
        for (let i = skipStart; i < bp.leftEdge.length - 1; i++) {
            const wp1 = bp.leftEdge[i];
            const wp2 = bp.leftEdge[i + 1];
            
            // Calculate perpendicular direction for thickness
            const dx = wp2.x - wp1.x;
            const dy = wp2.y - wp1.y;
            const len = Math.sqrt(dx * dx + dy * dy);
            const nx = -dy / len;
            const ny = dx / len;
            
            // Create thick line as 2 triangles
            const halfThick = edgeThickness;
            const p1x = wp1.x + nx * halfThick;
            const p1y = wp1.y + ny * halfThick;
            const p2x = wp1.x - nx * halfThick;
            const p2y = wp1.y - ny * halfThick;
            const p3x = wp2.x - nx * halfThick;
            const p3y = wp2.y - ny * halfThick;
            const p4x = wp2.x + nx * halfThick;
            const p4y = wp2.y + ny * halfThick;
            
            edgePositions.push(
                p1x, p1y,
                p2x, p2y,
                p3x, p3y,
                p1x, p1y,
                p3x, p3y,
                p4x, p4y
            );
            
            for (let j = 0; j < 6; j++) {
                edgeColors.push(...color);
            }
        }
        
        for (let i = 0; i < bp.rightEdge.length - skipEnd - 1; i++) {
            const wp1 = bp.rightEdge[i];
            const wp2 = bp.rightEdge[i + 1];
            
            // Calculate perpendicular direction for thickness
            const dx = wp2.x - wp1.x;
            const dy = wp2.y - wp1.y;
            const len = Math.sqrt(dx * dx + dy * dy);
            const nx = -dy / len;
            const ny = dx / len;
            
            // Create thick line as 2 triangles
            const halfThick = edgeThickness;
            const p1x = wp1.x + nx * halfThick;
            const p1y = wp1.y + ny * halfThick;
            const p2x = wp1.x - nx * halfThick;
            const p2y = wp1.y - ny * halfThick;
            const p3x = wp2.x - nx * halfThick;
            const p3y = wp2.y - ny * halfThick;
            const p4x = wp2.x + nx * halfThick;
            const p4y = wp2.y + ny * halfThick;
            
            edgePositions.push(
                p1x, p1y,
                p2x, p2y,
                p3x, p3y,
                p1x, p1y,
                p3x, p3y,
                p4x, p4y
            );
            
            for (let j = 0; j < 6; j++) {
                edgeColors.push(...color);
            }
        }
    }
}

function buildCenterLine() {
    const color = rgbaToRgb('rgba(255,255,255,0.25)');
    const inset = TRACK_WIDTH * 0.38;
    
    for (let i = 0; i < trackPath.length - 1; i++) {
        const wp = trackPath[i];
        const wpNext = trackPath[i + 1];
        
        // Left shoulder line
        const lx1 = wp.x + wp.nx * inset;
        const ly1 = wp.y + wp.ny * inset;
        const lx2 = wpNext.x + wpNext.nx * inset;
        const ly2 = wpNext.y + wpNext.ny * inset;
        
        centerLinePositions.push(lx1, ly1, lx2, ly2);
        centerLineColors.push(...color, ...color);
        
        // Right shoulder line
        const rx1 = wp.x - wp.nx * inset;
        const ry1 = wp.y - wp.ny * inset;
        const rx2 = wpNext.x - wpNext.nx * inset;
        const ry2 = wpNext.y - wpNext.ny * inset;
        
        centerLinePositions.push(rx1, ry1, rx2, ry2);
        centerLineColors.push(...color, ...color);
    }
}

function buildWalls() {
    const wallColor = hexToRgb(COLORS.wallColor);
    const wallEdgeColor = hexToRgb(COLORS.wallEdge);
    const wallThickness = 8;
    
    for (let wall of trackWalls) {
        for (let i = wall.startIdx; i < wall.endIdx && i < trackPath.length - 1; i++) {
            if (wall.side === 'left' || wall.side === 'both') {
                const wp1 = trackLeftEdge[i];
                const wp2 = trackLeftEdge[i + 1];
                const p = trackPath[i];
                const p2 = trackPath[i + 1];
                
                const wo1x = wp1.x + p.nx * wallThickness;
                const wo1y = wp1.y + p.ny * wallThickness;
                const wo2x = wp2.x + p2.nx * wallThickness;
                const wo2y = wp2.y + p2.ny * wallThickness;
                
                wallPositions.push(
                    wp1.x, wp1.y,
                    wp2.x, wp2.y,
                    wo2x, wo2y,
                    wp1.x, wp1.y,
                    wo2x, wo2y,
                    wo1x, wo1y
                );
                
                for (let j = 0; j < 6; j++) {
                    wallColors.push(...wallColor);
                }
            }
            
            if (wall.side === 'right' || wall.side === 'both') {
                const wp1 = trackRightEdge[i];
                const wp2 = trackRightEdge[i + 1];
                const p = trackPath[i];
                const p2 = trackPath[i + 1];
                
                const wo1x = wp1.x - p.nx * wallThickness;
                const wo1y = wp1.y - p.ny * wallThickness;
                const wo2x = wp2.x - p2.nx * wallThickness;
                const wo2y = wp2.y - p2.ny * wallThickness;
                
                wallPositions.push(
                    wp1.x, wp1.y,
                    wp2.x, wp2.y,
                    wo2x, wo2y,
                    wp1.x, wp1.y,
                    wo2x, wo2y,
                    wo1x, wo1y
                );
                
                for (let j = 0; j < 6; j++) {
                    wallColors.push(...wallColor);
                }
            }
        }
    }
}

// ==================== WEBGL RENDERING ====================
function renderWebGL() {
    gl.clearColor(0, 0, 0, 0);
    gl.clear(gl.COLOR_BUFFER_BIT);
    
    gl.useProgram(webglProgram);
    
    gl.uniform2f(resolutionLocation, webglCanvas.width, webglCanvas.height);
    gl.uniform2f(cameraLocation, camera.x, camera.y);
    gl.uniform1f(scaleLocation, VIEW_SCALE);
    gl.uniform1f(cosLocation, cameraTransform.cos);
    gl.uniform1f(sinLocation, cameraTransform.sin);
    gl.uniform1f(swayLocation, camera.swayOffset);
    gl.uniform2f(offsetLocation, W / 2, H * 0.6);
    
    gl.enableVertexAttribArray(positionLocation);
    gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
    gl.vertexAttribPointer(positionLocation, 2, gl.FLOAT, false, 0, 0);
    
    gl.enableVertexAttribArray(colorLocation);
    gl.bindBuffer(gl.ARRAY_BUFFER, colorBuffer);
    gl.vertexAttribPointer(colorLocation, 4, gl.FLOAT, false, 0, 0);
    
    gl.enable(gl.BLEND);
    gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);
    
    // Draw edges first (bottom layer) - as triangles for thickness
    if (edgePositions.length > 0) {
        gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
        gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(edgePositions), gl.DYNAMIC_DRAW);
        gl.bindBuffer(gl.ARRAY_BUFFER, colorBuffer);
        gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(edgeColors), gl.DYNAMIC_DRAW);
        gl.drawArrays(gl.TRIANGLES, 0, edgePositions.length / 2);
    }
    
    // Draw walls
    if (wallPositions.length > 0) {
        gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
        gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(wallPositions), gl.DYNAMIC_DRAW);
        gl.bindBuffer(gl.ARRAY_BUFFER, colorBuffer);
        gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(wallColors), gl.DYNAMIC_DRAW);
        gl.drawArrays(gl.TRIANGLES, 0, wallPositions.length / 2);
    }
    
    // Draw branch surfaces using TRIANGLES (to avoid TRIANGLE_STRIP issues)
    if (branchSurfacePositions.length > 0) {
        gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
        gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(branchSurfacePositions), gl.DYNAMIC_DRAW);
        gl.bindBuffer(gl.ARRAY_BUFFER, colorBuffer);
        gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(branchSurfaceColors), gl.DYNAMIC_DRAW);
        gl.drawArrays(gl.TRIANGLES, 0, branchSurfacePositions.length / 2);
    }
    
    // Draw track surface using TRIANGLE_STRIP
    if (trackSurfacePositions.length > 0) {
        gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
        gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(trackSurfacePositions), gl.DYNAMIC_DRAW);
        gl.bindBuffer(gl.ARRAY_BUFFER, colorBuffer);
        gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(trackSurfaceColors), gl.DYNAMIC_DRAW);
        gl.drawArrays(gl.TRIANGLE_STRIP, 0, trackSurfacePositions.length / 2);
    }
    
    // Draw center lines
    if (centerLinePositions.length > 0) {
        gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
        gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(centerLinePositions), gl.DYNAMIC_DRAW);
        gl.bindBuffer(gl.ARRAY_BUFFER, colorBuffer);
        gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(centerLineColors), gl.DYNAMIC_DRAW);
        gl.lineWidth(2.0);
        gl.drawArrays(gl.LINES, 0, centerLinePositions.length / 2);
    }
}

function suspendAudio() {
    if (!audioCtx || audioSuspended) return;
    audioSuspended = true;
    if (audioCtx.state === 'running') {
        audioCtx.suspend();
    }
}

function resumeAudio() {
    if (!audioCtx || !audioSuspended) return;
    audioSuspended = false;
    if (audioCtx.state === 'suspended') {
        audioCtx.resume();
    }
}

document.addEventListener('visibilitychange', function() {
    if (document.hidden) {
        suspendAudio();
    } else {
        resumeAudio();
    }
});

window.addEventListener('blur', function() {
    suspendAudio();
});

window.addEventListener('focus', function() {
    resumeAudio();
});

// ==================== RESIZE ====================
function resize() {
    let dpr = window.devicePixelRatio || 1;
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    // Reset transform before scaling to prevent compounding on repeated resize
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', resize);

// ==================== INPUT ====================
window.addEventListener('keydown', function(e) {
    keys[e.code] = true;
    if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code)) {
        e.preventDefault();
    }
    initAudio();

    if (gameState === 'menu') {
        if (e.code === 'Enter' || e.code === 'Space') startGame();
    }
    if (gameState === 'results' || finishResultsShown) {
        if (e.code === 'Digit1' || e.code === 'Numpad1') { stopGameSounds(); gameState = 'menu'; finishResultsShown = false; }
        if (e.code === 'Digit2' || e.code === 'Numpad2') continueDriving();
    }
});

window.addEventListener('keyup', function(e) {
    keys[e.code] = false;
});

// Touch controls
let touchAreas = [];
function setupTouchAreas() {
    const bw = 70, bh = 65;
    const margin = 32;
    const bottomOffset = 70;
    const btnGap = 5;
    // Left side: left/right (steering), Right side: up/down (gas/brake)
    touchAreas = [
        { id: 'up', x: W - bw - margin, y: H - bh * 2 - margin - bottomOffset, w: bw, h: bh },
        { id: 'down', x: W - bw - margin, y: H - bh - margin - bottomOffset + btnGap, w: bw, h: bh },
        { id: 'left', x: margin, y: H - bh - margin - bottomOffset + btnGap, w: bw, h: bh },
        { id: 'right', x: margin + bw + btnGap, y: H - bh - margin - bottomOffset + btnGap, w: bw, h: bh }
    ];
}
setupTouchAreas();

canvas.addEventListener('touchstart', function(e) {
    e.preventDefault();
    initAudio();
    handleTouches(e.touches);
    // Menu clicks
    if (gameState === 'menu') {
        for (let t = 0; t < e.touches.length; t++) {
            let tx = e.touches[t].clientX, ty = e.touches[t].clientY;
            for (let i = 0; i < menuButtonRects.length; i++) {
                let b = menuButtonRects[i];
                if (tx >= b.x && tx <= b.x + b.w && ty >= b.y && ty <= b.y + b.h) {
                    startGame();
                }
            }
        }
    }
    // Home button during racing
    if (gameState === 'racing' && !finishResultsShown && homeButtonRect) {
        for (let t = 0; t < e.touches.length; t++) {
            let tx = e.touches[t].clientX, ty = e.touches[t].clientY;
            if (tx >= homeButtonRect.x && tx <= homeButtonRect.x + homeButtonRect.w &&
                ty >= homeButtonRect.y && ty <= homeButtonRect.y + homeButtonRect.h) {
                showExitConfirm = true;
                return;
            }
        }
    }
    // Exit confirmation dialog
    if (showExitConfirm) {
        for (let t = 0; t < e.touches.length; t++) {
            let tx = e.touches[t].clientX, ty = e.touches[t].clientY;
            let btnW = 100, btnH = 40;
            let btnY = H / 2 + 30;
            let btn1X = W / 2 - btnW - 15;
            let btn2X = W / 2 + 15;
            // Cancel button
            if (tx >= btn1X && tx <= btn1X + btnW && ty >= btnY && ty <= btnY + btnH) {
                showExitConfirm = false;
            }
            // Confirm button
            if (tx >= btn2X && tx <= btn2X + btnW && ty >= btnY && ty <= btnY + btnH) {
                showExitConfirm = false;
                stopGameSounds();
                gameState = 'menu';
            }
        }
        return;
    }
    if (gameState === 'results' || finishResultsShown) {
        for (let t = 0; t < e.touches.length; t++) {
            let tx = e.touches[t].clientX, ty = e.touches[t].clientY;
            for (let i = 0; i < resultButtonRects.length; i++) {
                let b = resultButtonRects[i];
                if (tx >= b.x && tx <= b.x + b.w && ty >= b.y && ty <= b.y + b.h) {
                    if (i === 0) { stopGameSounds(); gameState = 'menu'; finishResultsShown = false; }
                    else if (i === 1) continueDriving();
                    else if (i === 2) PerfMonitor.downloadReport();
                }
            }
        }
    }
}, { passive: false });

canvas.addEventListener('touchmove', function(e) {
    e.preventDefault();
    handleTouches(e.touches);
}, { passive: false });

canvas.addEventListener('touchend', function(e) {
    e.preventDefault();
    handleTouches(e.touches);
}, { passive: false });

function handleTouches(touches) {
    touchControls.left = false;
    touchControls.right = false;
    touchControls.up = false;
    touchControls.down = false;
    for (let t = 0; t < touches.length; t++) {
        let tx = touches[t].clientX, ty = touches[t].clientY;
        for (let a of touchAreas) {
            if (tx >= a.x && tx <= a.x + a.w && ty >= a.y && ty <= a.y + a.h) {
                touchControls[a.id] = true;
            }
        }
    }
}

// ==================== AUDIO ====================
function initAudio() {
    if (audioInitialized) return;
    audioInitialized = true;
    try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        // Master compressor to prevent clipping
        masterCompressor = audioCtx.createDynamicsCompressor();
        masterCompressor.threshold.value = -20;
        masterCompressor.knee.value = 20;
        masterCompressor.ratio.value = 8;
        masterCompressor.attack.value = 0.003;
        masterCompressor.release.value = 0.15;
        masterCompressor.connect(audioCtx.destination);

        // Engine: triangle wave (smoother than sawtooth)
        engineOsc = audioCtx.createOscillator();
        engineOsc.type = 'triangle';
        engineOsc.frequency.value = 100;
        engineGain = audioCtx.createGain();
        engineGain.gain.value = 0;
        let engineFilter = audioCtx.createBiquadFilter();
        engineFilter.type = 'lowpass';
        engineFilter.frequency.value = 600;
        engineFilter.Q.value = 1;
        engineOsc.connect(engineFilter);
        engineFilter.connect(engineGain);
        engineGain.connect(masterCompressor);
        engineOsc.start();

        // Wind noise
        let bufferSize = audioCtx.sampleRate * 2;
        let noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        let output = noiseBuffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
            output[i] = Math.random() * 2 - 1;
        }
        windNode = audioCtx.createBufferSource();
        windNode.buffer = noiseBuffer;
        windNode.loop = true;
        windGain = audioCtx.createGain();
        windGain.gain.value = 0;
        let windFilter = audioCtx.createBiquadFilter();
        windFilter.type = 'bandpass';
        windFilter.frequency.value = 500;
        windFilter.Q.value = 0.5;
        windNode.connect(windFilter);
        windFilter.connect(windGain);
        windGain.connect(masterCompressor);
        windNode.start();

        // Brake noise (wind-like friction sound)
        let brakeBufferSize = audioCtx.sampleRate * 2;
        let brakeNoiseBuffer = audioCtx.createBuffer(1, brakeBufferSize, audioCtx.sampleRate);
        let brakeOutput = brakeNoiseBuffer.getChannelData(0);
        for (let i = 0; i < brakeBufferSize; i++) {
            brakeOutput[i] = Math.random() * 2 - 1;
        }
        brakeNoiseNode = audioCtx.createBufferSource();
        brakeNoiseNode.buffer = brakeNoiseBuffer;
        brakeNoiseNode.loop = true;
        brakeGain = audioCtx.createGain();
        brakeGain.gain.value = 0;
        let brakeFilter = audioCtx.createBiquadFilter();
        brakeFilter.type = 'highpass';
        brakeFilter.frequency.value = 800;
        let brakeFilter2 = audioCtx.createBiquadFilter();
        brakeFilter2.type = 'lowpass';
        brakeFilter2.frequency.value = 3000;
        brakeNoiseNode.connect(brakeFilter);
        brakeFilter.connect(brakeFilter2);
        brakeFilter2.connect(brakeGain);
        brakeGain.connect(masterCompressor);
        brakeNoiseNode.start();
    } catch (e) {
        audioInitialized = false;
    }
}

function updateEngineSound(speed, maxSpeed) {
    if (!audioCtx || !engineOsc) return;
    let ratio = Math.abs(speed) / maxSpeed;
    let t = audioCtx.currentTime;
    engineOsc.frequency.setTargetAtTime(90 + ratio * 180, t, 0.05);
    engineGain.gain.setTargetAtTime(Math.min(0.20, ratio * 0.22), t, 0.05); // Increased max volume for 220 max speed
    if (windGain) {
        windGain.gain.setTargetAtTime(Math.min(0.012, ratio * ratio * 0.015), t, 0.05);
    }
}

function createNPCEngineSound(npc) {
    if (!audioCtx || !NPC_AUDIO_ENABLED) return null;
    try {
        let osc = audioCtx.createOscillator();
        osc.type = 'triangle';
        osc.frequency.value = 100;
        
        let gain = audioCtx.createGain();
        gain.gain.value = 0;
        
        let filter = audioCtx.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.value = 550;
        filter.Q.value = 0.8;
        
        osc.connect(filter);
        filter.connect(gain);
        gain.connect(masterCompressor);
        osc.start();
        
        return { oscillator: osc, gain: gain, currentGain: 0 };
    } catch(e) {
        return null;
    }
}

function destroyNPCEngineSound(audioNode) {
    if (!audioNode) return;
    try {
        let t = audioCtx.currentTime;
        audioNode.gain.gain.setTargetAtTime(0, t, 0.03);
        audioNode.oscillator.stop(t + 0.05);
        audioNode.oscillator.disconnect();
        audioNode.gain.disconnect();
    } catch(e) {}
}

function updateNPCEngineSound(npc, player) {
    if (!NPC_AUDIO_ENABLED || !audioCtx) return;
    
    let audioIdx = npc.audioIndex;
    if (audioIdx === undefined || audioIdx < 0 || audioIdx >= npcAudioNodes.length) return;
    
    let dx = npc.x - player.x;
    let dy = npc.y - player.y;
    let distance = Math.sqrt(dx * dx + dy * dy);
    
    let shouldBeActive = distance < NPC_AUDIO_MAX_DISTANCE;
    let audioNode = npcAudioNodes[audioIdx];
    
    if (shouldBeActive && !audioNode) {
        audioNode = createNPCEngineSound(npc);
        npcAudioNodes[audioIdx] = audioNode;
    } else if (!shouldBeActive && audioNode) {
        destroyNPCEngineSound(audioNode);
        npcAudioNodes[audioIdx] = null;
        return;
    }
    
    if (!audioNode) return;
    
    let t = audioCtx.currentTime;
    let ratio = Math.abs(npc.speed) / npc.maxSpeed;
    
    let distanceFactor = 1 - Math.min(1, distance / NPC_AUDIO_MAX_DISTANCE);
    distanceFactor = distanceFactor * distanceFactor;
    
    if (distance < NPC_AUDIO_FADE_DISTANCE) {
        distanceFactor = 1;
    }
    
    let baseGain = 0.20;
    let targetGain = baseGain * ratio * distanceFactor;
    targetGain = Math.min(targetGain, 0.20);
    
    audioNode.currentGain = lerp(audioNode.currentGain, targetGain, 0.1);
    audioNode.gain.gain.setTargetAtTime(audioNode.currentGain, t, 0.05);
    
    let baseFreq = 100;
    let targetFreq = baseFreq + ratio * 160;
    audioNode.oscillator.frequency.setTargetAtTime(targetFreq, t, 0.05);
}

function playCollisionSound() {
    if (!audioCtx) return;
    let now = audioCtx.currentTime;
    if (now - lastCollisionSoundTime < 0.1) return;
    lastCollisionSoundTime = now;
    try {
        let bufSize = Math.floor(audioCtx.sampleRate * 0.12);
        let buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
        let data = buf.getChannelData(0);
        for (let i = 0; i < bufSize; i++) {
            let env = 1 - i / bufSize;
            data[i] = (Math.random() * 2 - 1) * env * 0.5;
        }
        let src = audioCtx.createBufferSource();
        src.buffer = buf;
        let filt = audioCtx.createBiquadFilter();
        filt.type = 'lowpass';
        filt.frequency.value = 600;
        let g = audioCtx.createGain();
        g.gain.value = 0.4;
        g.gain.setTargetAtTime(0, now + 0.05, 0.03);
        src.connect(filt);
        filt.connect(g);
        g.connect(masterCompressor);
        src.start();
        src.stop(now + 0.15);
    } catch(e) {}
}

function playWallSound() {
    if (!audioCtx) return;
    let now = audioCtx.currentTime;
    if (now - lastWallSoundTime < 0.15) return;
    lastWallSoundTime = now;
    try {
        let osc = audioCtx.createOscillator();
        osc.type = 'sine';
        osc.frequency.value = 180;
        osc.frequency.setTargetAtTime(100, now + 0.05, 0.04);
        let g = audioCtx.createGain();
        g.gain.value = 0.2;
        g.gain.setTargetAtTime(0.001, now + 0.05, 0.04);
        osc.connect(g);
        g.connect(masterCompressor);
        osc.start(now);
        osc.stop(now + 0.15);
    } catch(e) {}
}

function playBrakeSound(intensity) {
    if (!audioCtx || !brakeGain) return;
    let now = audioCtx.currentTime;
    let targetGain = Math.min(0.01, intensity * 0.02); // Reduced brake sound volume
    brakeGain.gain.setTargetAtTime(targetGain, now, 0.05);
}

function stopBrakeSound() {
    if (!audioCtx || !brakeGain) return;
    let now = audioCtx.currentTime;
    brakeGain.gain.setTargetAtTime(0, now, 0.08);
}

function stopGameSounds() {
    if (!audioCtx) return;
    let t = audioCtx.currentTime;
    if (engineGain) engineGain.gain.setTargetAtTime(0, t, 0.05);
    if (windGain) windGain.gain.setTargetAtTime(0, t, 0.05);
    if (brakeGain) brakeGain.gain.setTargetAtTime(0, t, 0.05);
    
    // Stop all NPC engine sounds
    if (NPC_AUDIO_ENABLED) {
        for (let i = 0; i < npcAudioNodes.length; i++) {
            if (npcAudioNodes[i]) {
                destroyNPCEngineSound(npcAudioNodes[i]);
                npcAudioNodes[i] = null;
            }
        }
    }
}

function playTireScreech(intensity) {
    if (!audioCtx) return;
    try {
        let now = audioCtx.currentTime;
        let bufSize = Math.floor(audioCtx.sampleRate * 0.1);
        let buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
        let data = buf.getChannelData(0);
        for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1) * 0.3;
        let src = audioCtx.createBufferSource();
        src.buffer = buf;
        let filt = audioCtx.createBiquadFilter();
        filt.type = 'highpass';
        filt.frequency.value = 2500;
        let g = audioCtx.createGain();
        g.gain.value = Math.min(0.06, intensity * 0.08);
        g.gain.setTargetAtTime(0.001, now + 0.04, 0.03);
        src.connect(filt);
        filt.connect(g);
        g.connect(masterCompressor);
        src.start();
        src.stop(now + 0.12);
    } catch(e) {}
}

function playCountdownBeep(isGo) {
    if (!audioCtx) return;
    try {
        let now = audioCtx.currentTime;
        let osc = audioCtx.createOscillator();
        osc.type = 'sine';
        let g = audioCtx.createGain();
        if (isGo) {
            // Higher pitch, longer, for "GO!"
            osc.frequency.setValueAtTime(523, now);
            osc.frequency.setTargetAtTime(659, now + 0.05, 0.03);
            g.gain.setValueAtTime(0.12, now);
            g.gain.setTargetAtTime(0.001, now + 0.35, 0.1);
            osc.connect(g); g.connect(masterCompressor);
            osc.start(now); osc.stop(now + 0.5);
        } else {
            // Short tick for 3-2-1
            osc.frequency.setValueAtTime(440, now);
            g.gain.setValueAtTime(0.1, now);
            g.gain.setTargetAtTime(0.001, now + 0.12, 0.04);
            osc.connect(g); g.connect(masterCompressor);
            osc.start(now); osc.stop(now + 0.2);
        }
    } catch(e) {}
}

// ==================== MATH HELPERS ====================
function lerp(a, b, t) { return a + (b - a) * t; }
function clamp(v, mn, mx) { return Math.max(mn, Math.min(mx, v)); }
function dist(x1, y1, x2, y2) { return Math.sqrt((x2-x1)*(x2-x1) + (y2-y1)*(y2-y1)); }
function angleDiff(a, b) {
    let d = b - a;
    while (d > Math.PI) d -= Math.PI * 2;
    while (d < -Math.PI) d += Math.PI * 2;
    return d;
}
function normalizeAngle(a) {
    while (a > Math.PI) a -= Math.PI * 2;
    while (a < -Math.PI) a += Math.PI * 2;
    return a;
}
function randRange(a, b) { return a + Math.random() * (b - a); }
function randInt(a, b) { return Math.floor(randRange(a, b + 1)); }

function segmentIntersect(ax,ay,bx,by,cx,cy,dx,dy) {
    let denom = (bx-ax)*(dy-cy) - (by-ay)*(dx-cx);
    if (Math.abs(denom) < 1e-10) return false;
    let t = ((cx-ax)*(dy-cy) - (cy-ay)*(dx-cx)) / denom;
    let u = ((cx-ax)*(by-ay) - (cy-ay)*(bx-ax)) / denom;
    return t >= 0 && t <= 1 && u >= 0 && u <= 1;
}

// ==================== CATMULL-ROM SPLINE ====================
function catmullRom(p0, p1, p2, p3, t) {
    let t2 = t * t, t3 = t2 * t;
    return {
        x: 0.5 * ((2*p1.x) + (-p0.x + p2.x)*t + (2*p0.x - 5*p1.x + 4*p2.x - p3.x)*t2 + (-p0.x + 3*p1.x - 3*p2.x + p3.x)*t3),
        y: 0.5 * ((2*p1.y) + (-p0.y + p2.y)*t + (2*p0.y - 5*p1.y + 4*p2.y - p3.y)*t2 + (-p0.y + 3*p1.y - 3*p2.y + p3.y)*t3)
    };
}

function catmullRomDerivative(p0, p1, p2, p3, t) {
    let t2 = t * t;
    return {
        x: 0.5 * ((-p0.x + p2.x) + (4*p0.x - 10*p1.x + 8*p2.x - 2*p3.x)*t + (-3*p0.x + 9*p1.x - 9*p2.x + 3*p3.x)*t2),
        y: 0.5 * ((-p0.y + p2.y) + (4*p0.y - 10*p1.y + 8*p2.y - 2*p3.y)*t + (-3*p0.y + 9*p1.y - 9*p2.y + 3*p3.y)*t2)
    };
}

// ==================== TRACK GENERATION ====================
function segmentsIntersect(a, b, c, d) {
    let denom = (b.x - a.x) * (d.y - c.y) - (b.y - a.y) * (d.x - c.x);
    if (Math.abs(denom) < 1e-10) return false;
    let t = ((c.x - a.x) * (d.y - c.y) - (c.y - a.y) * (d.x - c.x)) / denom;
    let u = ((c.x - a.x) * (b.y - a.y) - (c.y - a.y) * (b.x - a.x)) / denom;
    return t >= 0 && t <= 1 && u >= 0 && u <= 1;
}

// Calculate distance from point to line segment
function pointToSegmentDistance(point, segStart, segEnd) {
    let dx = segEnd.x - segStart.x;
    let dy = segEnd.y - segStart.y;
    let lenSq = dx * dx + dy * dy;
    
    if (lenSq === 0) {
        let px = point.x - segStart.x;
        let py = point.y - segStart.y;
        return Math.sqrt(px * px + py * py);
    }
    
    let t = ((point.x - segStart.x) * dx + (point.y - segStart.y) * dy) / lenSq;
    t = Math.max(0, Math.min(1, t));
    
    let projX = segStart.x + t * dx;
    let projY = segStart.y + t * dy;
    
    let px = point.x - projX;
    let py = point.y - projY;
    
    return Math.sqrt(px * px + py * py);
}

// Check if path points have self-intersection
function pathHasIntersection(path, skipNearby) {
    let len = path.length;
    for (let i = 0; i < len - 1; i++) {
        for (let j = i + skipNearby; j < len - 1; j++) {
            if (segmentsIntersect(path[i], path[i + 1], path[j], path[j + 1])) {
                return true;
            }
        }
    }
    return false;
}

function generateSprintTrack() {
    // Reset arc continuation state for new track
    if (window.arcContinuation) {
        window.arcContinuation.count = 0;
    }
    if (window.hairpinContinuation) {
        window.hairpinContinuation.count = 0;
    }
    if (window.bigTurnContinuation) {
        window.bigTurnContinuation.count = 0;
    }
    let maxAttempts = 30;
    
    for (let attempt = 0; attempt < maxAttempts; attempt++) {
        let nodeCount = randInt(100, 130);
        let nodes = [];
        let baseAngle = randRange(-Math.PI / 2, Math.PI / 2);
        let x = 0, y = 0;
        let valid = true;
        
        // Track if last segment was a curve to enforce longer straights after curves
        let lastWasCurve = false;
        let straightAfterCurveCount = 0;
        
        for (let i = 0; i < nodeCount && valid; i++) {
            nodes.push({ x: x, y: y });
            
            let segLen = randRange(600, 1000);
            let r = Math.random();
            let turnAmount;
            let isCurve = false;
            
            // If we just had a curve, 25% chance to enforce a longer straight section
            if (lastWasCurve && straightAfterCurveCount < 2 && Math.random() < 0.25) {
                // Force a straight section after curve (minimum 2 segments)
                turnAmount = 0;
                segLen = randRange(700, 1100);
                straightAfterCurveCount++;
                lastWasCurve = false;
            }
            // Hairpin turn (发卡弯) - 12% chance
            if (r < 0.12) {
                let hairpinDir = Math.random() < 0.5 ? 1 : -1;
                turnAmount = randRange(0.6, 0.9) * hairpinDir;
                segLen = randRange(400, 600);
                isCurve = true;
                // Mark for hairpin continuation - opposite direction next
                if (!window.hairpinContinuation) window.hairpinContinuation = { count: 0, amount: 0 };
                window.hairpinContinuation.count = randInt(2, 3);
                window.hairpinContinuation.amount = -turnAmount * 0.7; // Opposite direction, slightly less
            }
            // Continue hairpin turn (second part of U-shape)
            else if (window.hairpinContinuation && window.hairpinContinuation.count > 0) {
                turnAmount = window.hairpinContinuation.amount;
                segLen = randRange(400, 600);
                isCurve = true;
                window.hairpinContinuation.count--;
            }
            // Big 90-degree turn for square-like track (25% chance)
            else if (r < 0.37) {
                let turnDir = Math.random() < 0.5 ? 1 : -1;
                turnAmount = randRange(0.8, 1.2) * turnDir; // Large turn angle
                segLen = randRange(600, 900);
                isCurve = true;
                if (!window.bigTurnContinuation) window.bigTurnContinuation = { count: 0, amount: 0 };
                window.bigTurnContinuation.count = 1;
                window.bigTurnContinuation.amount = turnAmount;
            }
            // Continue big turn - straight section to complete 90-degree
            else if (window.bigTurnContinuation && window.bigTurnContinuation.count > 0) {
                turnAmount = 0;
                segLen = randRange(600, 900); // Increased from 500-700
                window.bigTurnContinuation.count = 0;
            }
            // Large arc / near-circle curve (5% chance)
            else if (r < 0.42) {
                // Generate a continuous arc by setting a consistent small turn
                // This creates near-circular large radius curves
                let arcDir = Math.random() < 0.5 ? 1 : -1;
                turnAmount = randRange(0.08, 0.15) * arcDir;
                segLen = randRange(500, 800);
                isCurve = true;
                // Mark for continuation in next segments
                if (!window.arcContinuation) window.arcContinuation = { count: 0, amount: 0 };
                window.arcContinuation.count = randInt(3, 6);
                window.arcContinuation.amount = turnAmount;
            }
            // Continue previous arc
            else if (window.arcContinuation && window.arcContinuation.count > 0) {
                turnAmount = window.arcContinuation.amount;
                segLen = randRange(500, 800);
                isCurve = true;
                window.arcContinuation.count--;
            }
            // S-curve pattern - realistic S-bend (first turn) - 13% chance
            else if (r < 0.55) {
                turnAmount = randRange(0.7, 1.0) * (Math.random() < 0.5 ? 1 : -1);
                if (!window.sCurveContinuation) window.sCurveContinuation = { count: 0, amount: 0, phase: 0 };
                window.sCurveContinuation.count = 1;
                window.sCurveContinuation.amount = turnAmount > 0 ? 1 : -1;
                window.sCurveContinuation.phase = 'turn1';
                segLen = randRange(500, 700);
                isCurve = true;
            }
            // S-curve - straight middle section
            else if (window.sCurveContinuation && window.sCurveContinuation.count > 0 && window.sCurveContinuation.phase === 'turn1') {
                turnAmount = 0;
                segLen = randRange(500, 700); // Increased from 400-600
                window.sCurveContinuation.count = 1;
                window.sCurveContinuation.phase = 'straight';
            }
            // S-curve - second opposite turn
            else if (window.sCurveContinuation && window.sCurveContinuation.count > 0 && window.sCurveContinuation.phase === 'straight') {
                turnAmount = randRange(0.7, 1.0) * (window.sCurveContinuation.amount > 0 ? -1 : 1);
                segLen = randRange(500, 700);
                window.sCurveContinuation.count = 0;
                window.sCurveContinuation.phase = 0;
                isCurve = true;
            }
            // Long straight (10% chance)
            else if (r < 0.65) {
                turnAmount = 0;
                segLen = randRange(800, 1200);
            }
            // Gentle curves (15% chance)
            else if (r < 0.80) {
                turnAmount = randRange(-0.35, 0.35);
                isCurve = Math.abs(turnAmount) > 0.15;
            }
            // Sharper turns (remaining chance)
            else {
                turnAmount = randRange(-0.5, 0.5);
                isCurve = Math.abs(turnAmount) > 0.15;
            }
            
            // Update curve tracking
            if (isCurve) {
                lastWasCurve = true;
                straightAfterCurveCount = 0;
            }
            
            let newAngle = baseAngle + turnAmount;
            let nx = x + Math.cos(newAngle) * segLen;
            let ny = y + Math.sin(newAngle) * segLen;
            
            // Self-intersection check on nodes (skip last 8 segments for better detection)
            let hasIntersection = false;
            if (nodes.length > 10) {
                let newSegStart = { x: x, y: y };
                let newSegEnd = { x: nx, y: ny };
                
                for (let j = 0; j < nodes.length - 8; j++) {
                    if (segmentsIntersect(nodes[j], nodes[j + 1], newSegStart, newSegEnd)) {
                        hasIntersection = true;
                        break;
                    }
                }
                
                // Also check if new segment comes too close to existing nodes (proximity check)
                if (!hasIntersection) {
                    for (let j = 0; j < nodes.length - 8; j++) {
                        let node = nodes[j];
                        let dist = pointToSegmentDistance(node, newSegStart, newSegEnd);
                        if (dist < TRACK_WIDTH * 0.6) {
                            hasIntersection = true;
                            break;
                        }
                    }
                }
            }
            
            if (hasIntersection) {
                // Try to find a valid direction with more retries
                let found = false;
                for (let retry = 0; retry < 15; retry++) {
                    turnAmount = randRange(-0.4, 0.4);
                    newAngle = baseAngle + turnAmount;
                    nx = x + Math.cos(newAngle) * segLen;
                    ny = y + Math.sin(newAngle) * segLen;
                    
                    hasIntersection = false;
                    let newSegStart = { x: x, y: y };
                    let newSegEnd = { x: nx, y: ny };
                    
                    for (let j = 0; j < nodes.length - 8; j++) {
                        if (segmentsIntersect(nodes[j], nodes[j + 1], newSegStart, newSegEnd)) {
                            hasIntersection = true;
                            break;
                        }
                    }
                    
                    // Also check proximity in retry
                    if (!hasIntersection) {
                        for (let j = 0; j < nodes.length - 8; j++) {
                            let node = nodes[j];
                            let dist = pointToSegmentDistance(node, newSegStart, newSegEnd);
                            if (dist < TRACK_WIDTH * 0.6) {
                                hasIntersection = true;
                                break;
                            }
                        }
                    }
                    
                    if (!hasIntersection) {
                        found = true;
                        break;
                    }
                }
                
                if (!found) {
                    // Continue in same direction
                    nx = x + Math.cos(baseAngle) * segLen;
                    ny = y + Math.sin(baseAngle) * segLen;
                    newAngle = baseAngle;
                }
            }
            
            x = nx;
            y = ny;
            baseAngle = newAngle;
        }
        
        // Build path and verify no intersection
        let testPath = buildTrackPath(nodes, false);
        
        // Check path for intersections (skip nearby segments - 50 points apart for stricter check)
        if (!pathHasIntersection(testPath, 50)) {
            return nodes;
        }
    }
    
    // Fallback: return a track with curves
    let nodes = [];
    let x = 0, y = 0, angle = 0;
    let curvePhase = 0;
    for (let i = 0; i < 80; i++) {
        nodes.push({ x: x, y: y });
        
        // Add some curves to fallback track
        if (i % 15 === 5) {
            // S-curve turn
            angle += randRange(0.6, 0.9) * (Math.random() < 0.5 ? 1 : -1);
        } else if (i % 15 === 10) {
            // Opposite turn
            angle += randRange(0.6, 0.9) * (Math.random() < 0.5 ? 1 : -1);
        } else {
            // Gentle variation
            angle += randRange(-0.15, 0.15);
        }
        
        x += Math.cos(angle) * 500;
        y += Math.sin(angle) * 500;
    }
    return nodes;
}

function buildTrackPath(nodes, closed) {
    let path = [];
    let n = nodes.length;
    let segCount = closed ? n : n - 1;
    for (let i = 0; i < segCount; i++) {
        let p0, p1, p2, p3;
        if (closed) {
            p0 = nodes[((i - 1) % n + n) % n];
            p1 = nodes[i % n];
            p2 = nodes[(i + 1) % n];
            p3 = nodes[(i + 2) % n];
        } else {
            p0 = nodes[Math.max(0, i - 1)];
            p1 = nodes[i];
            p2 = nodes[Math.min(n - 1, i + 1)];
            p3 = nodes[Math.min(n - 1, i + 2)];
        }
        for (let j = 0; j < SPLINE_SEGMENTS; j++) {
            let t = j / SPLINE_SEGMENTS;
            let pt = catmullRom(p0, p1, p2, p3, t);
            let dv = catmullRomDerivative(p0, p1, p2, p3, t);
            let len = Math.sqrt(dv.x * dv.x + dv.y * dv.y);
            if (len < 0.001) len = 0.001;
            let nx = -dv.y / len;
            let ny = dv.x / len;
            let dir = Math.atan2(dv.y, dv.x);
            path.push({ x: pt.x, y: pt.y, nx: nx, ny: ny, dir: dir });
        }
    }
    if (!closed) {
        let lastNode = nodes[n - 1];
        let prevPt = path[path.length - 1];
        let dx = lastNode.x - prevPt.x;
        let dy = lastNode.y - prevPt.y;
        let len = Math.sqrt(dx*dx + dy*dy);
        if (len < 0.001) len = 0.001;
        path.push({ x: lastNode.x, y: lastNode.y, nx: -dy / len, ny: dx / len, dir: Math.atan2(dy, dx) });
    }
    return path;
}

function buildEdges(path) {
    let left = [], right = [];
    let halfWidth = TRACK_WIDTH / 2;
    for (let i = 0; i < path.length; i++) {
        let p = path[i];
        left.push({ x: p.x + p.nx * halfWidth, y: p.y + p.ny * halfWidth });
        right.push({ x: p.x - p.nx * halfWidth, y: p.y - p.ny * halfWidth });
    }
    return { left, right };
}

function generateWalls(pathLength) {
    let walls = [];
    let wallCount = randInt(25, 40);
    let used = new Set();
    let branchZones = [];
    
    // Create exclusion zones around branch connections (wider zones)
    for (let bp of branchPaths) {
        if (bp.startIdx) {
            // Start connection zone - avoid walls 80 points before and after for cleaner connection
            branchZones.push({ 
                start: Math.max(0, bp.startIdx - 80), 
                end: Math.min(pathLength, bp.startIdx + 80) 
            });
        }
        if (bp.endIdx) {
            // End connection zone - avoid walls 80 points before and after
            branchZones.push({ 
                start: Math.max(0, bp.endIdx - 80), 
                end: Math.min(pathLength, bp.endIdx + 80) 
            });
        }
    }
    
    // Detect self-intersections in the main track
    let selfIntersectionZones = detectSelfIntersections(pathLength);
    
    // Also avoid the very start and end of the track
    let startExclude = { start: 0, end: Math.min(pathLength, 60) };
    let endExclude = { start: Math.max(0, pathLength - 60), end: pathLength };
    
    let attempts = 0;
    while (walls.length < wallCount && attempts < wallCount * 5) {
        attempts++;
        let len = randInt(15, 50);
        let start = randInt(10, pathLength - len - 10);
        let overlap = false;
        
        // Check if overlaps with used segments
        for (let i = start; i < start + len; i++) {
            if (used.has(i)) { overlap = true; break; }
        }
        if (overlap) continue;
        
        // Check if overlaps with start exclusion zone
        if (start < startExclude.end && start + len > startExclude.start) {
            overlap = true;
            continue;
        }
        
        // Check if overlaps with end exclusion zone
        if (start < endExclude.end && start + len > endExclude.start) {
            overlap = true;
            continue;
        }
        
        // Check if overlaps with branch connection zones
        for (let bz of branchZones) {
            if (start < bz.end && start + len > bz.start) { 
                overlap = true; 
                break; 
            }
        }
        if (overlap) continue;
        
        // Check if overlaps with self-intersection zones
        for (let sz of selfIntersectionZones) {
            if (start < sz.end && start + len > sz.start) {
                overlap = true;
                break;
            }
        }
        if (overlap) continue;
        
        // Mark segment as used
        for (let i = start; i < start + len; i++) used.add(i);
        
        // Randomly choose which side gets the wall
        let side = Math.random() < 0.4 ? 'left' : (Math.random() < 0.5 ? 'right' : 'both');
        walls.push({ startIdx: start, endIdx: start + len, side: side, minIdx: start, maxIdx: start + len });
    }
    return walls;
}

// Detect self-intersections in the main track and return exclusion zones
function detectSelfIntersections(pathLength) {
    let zones = [];
    let checkInterval = Math.max(50, Math.floor(pathLength / 20)); // Check every 50 points
    let searchRadius = 150; // Search for intersections within this range
    
    for (let i = 0; i < pathLength; i += checkInterval) {
        let p1 = trackPath[i];
        if (!p1) continue;
        
        // Look for other points that are close but far in index (not adjacent)
        for (let j = i + searchRadius; j < Math.min(pathLength, i + searchRadius * 3); j++) {
            let p2 = trackPath[j];
            if (!p2) continue;
            
            let dx = p1.x - p2.x;
            let dy = p1.y - p2.y;
            let dist = Math.sqrt(dx * dx + dy * dy);
            
            // If points are close but far apart in index, it's a self-intersection
            if (dist < TRACK_WIDTH * 2.5) {
                // Create exclusion zone around both points
                let zoneSize = 50;
                zones.push({
                    start: Math.max(0, i - zoneSize),
                    end: Math.min(pathLength, i + zoneSize)
                });
                zones.push({
                    start: Math.max(0, j - zoneSize),
                    end: Math.min(pathLength, j + zoneSize)
                });
            }
        }
    }
    
    // Merge overlapping zones
    if (zones.length === 0) return [];
    
    zones.sort((a, b) => a.start - b.start);
    let merged = [zones[0]];
    for (let i = 1; i < zones.length; i++) {
        let last = merged[merged.length - 1];
        let curr = zones[i];
        if (curr.start <= last.end) {
            last.end = Math.max(last.end, curr.end);
        } else {
            merged.push(curr);
        }
    }
    
    return merged;
}

// Global variable to store self-intersection zones
let selfIntersectionZones = [];

function generateTrack() {
    trackNodes = generateSprintTrack();
    trackPath = buildTrackPath(trackNodes, false);
    let edges = buildEdges(trackPath);
    trackLeftEdge = edges.left;
    trackRightEdge = edges.right;
    buildTrackGrid();
    generateBranches();
    buildBranchGrid();
    selfIntersectionZones = detectSelfIntersections(trackPath.length);
    trackWalls = generateWalls(trackPath.length);
    generateScenery();
    computeMinimapBounds();
    buildWebGLTrackData();
}

// ==================== MINIMAP BOUNDS ====================
let minimapBounds = { minTX: 0, maxTX: 0, minTY: 0, maxTY: 0, scale: 1, cx: 0, cy: 0 };

function computeMinimapBounds() {
    let minTX = Infinity, maxTX = -Infinity, minTY = Infinity, maxTY = -Infinity;
    for (let p of trackPath) {
        if (p.x < minTX) minTX = p.x;
        if (p.x > maxTX) maxTX = p.x;
        if (p.y < minTY) minTY = p.y;
        if (p.y > maxTY) maxTY = p.y;
    }
    let rangeX = maxTX - minTX || 1;
    let rangeY = maxTY - minTY || 1;
    let mapSize = 140;
    minimapBounds = {
        minTX: minTX, maxTX: maxTX, minTY: minTY, maxTY: maxTY,
        scale: (mapSize - 20) / Math.max(rangeX, rangeY),
        cx: (minTX + maxTX) / 2,
        cy: (minTY + maxTY) / 2
    };
}

// ==================== BRANCH PATHS ====================
// Branch path bounding boxes
let branchBounds = [];

// Spatial grid for branch point lookups (replaces linear scan)
const BRANCH_GRID_SIZE = 100;
let branchGrid = {};

function branchGridKey(x, y) {
    return Math.floor(x / BRANCH_GRID_SIZE) + "_" + Math.floor(y / BRANCH_GRID_SIZE);
}

function buildBranchGrid() {
    branchGrid = {};
    let threshold = (BRANCH_WIDTH / 2 + 30);
    for (let i = 0; i < branchPaths.length; i++) {
        let bp = branchPaths[i];
        if (!bp.path) continue;
        // Sample every other point for grid (density is sufficient)
        for (let j = 0; j < bp.path.length; j += 2) {
            let pt = bp.path[j];
            let key = branchGridKey(pt.x, pt.y);
            if (!branchGrid[key]) branchGrid[key] = [];
            branchGrid[key].push({ x: pt.x, y: pt.y, branchIdx: i, pointIdx: j });
        }
    }
}

// Spatial cache for branch checking
let branchCache = { x: 0, y: 0, result: false, age: 0 };
const BRANCH_CACHE_SIZE = 100;
const BRANCH_CACHE_MAX_AGE = 5;

function generateBranches() {
    branchPaths = [];
    branchBounds = [];
    let totalPts = trackPath.length;
    let numBranches = randInt(14, 20);
    let usedZones = [];

    for (let b = 0; b < numBranches; b++) {
        let attempts = 0;
        while (attempts < 50) {
            attempts++;
            let startIdx = randInt(Math.floor(totalPts * 0.06), Math.floor(totalPts * 0.7));
            let tooClose = false;
            for (let uz of usedZones) {
                if (Math.abs(startIdx - uz) < totalPts * 0.08) { tooClose = true; break; }
            }
            if (tooClose) continue;

            let sp = trackPath[startIdx];
            let side = Math.random() < 0.5 ? 1 : -1;
            let branchNodes = [];

            let rejoinIdx = Math.min(startIdx + randInt(50, 120), totalPts - 30);
            let rp = trackPath[rejoinIdx];
            let midCount = randInt(8, 14);
            let offsetDist = randRange(300, 600);
            
            // Extend branch start point into main track (for smooth connection)
            let extendDist = TRACK_WIDTH * 0.6;
            let startExtendX = sp.x - Math.cos(sp.dir) * extendDist;
            let startExtendY = sp.y - Math.sin(sp.dir) * extendDist;
            branchNodes.push({ x: startExtendX, y: startExtendY });
            
            // Original start point
            branchNodes.push({ x: sp.x, y: sp.y });
            
            // Create branch paths - curve out then curve back (large arc)
            for (let i = 1; i < midCount; i++) {
                let t = i / midCount;
                let baseX = lerp(sp.x, rp.x, t);
                let baseY = lerp(sp.y, rp.y, t);
                
                // Curve out from main road then curve back - creates large arc
                // Use sin(PI * t) to have small offset at start/end, max at middle
                let curveOutFactor = Math.sin(t * Math.PI); // 0 -> 1 -> 0
                let perpX = sp.nx * side * offsetDist * curveOutFactor;
                let perpY = sp.ny * side * offsetDist * curveOutFactor;
                
                let bx = baseX + perpX;
                let by = baseY + perpY;
                branchNodes.push({ x: bx, y: by });
            }
            
            // Original end point
            branchNodes.push({ x: rp.x, y: rp.y });
            
            // Extend branch end point into main track (for smooth connection)
            let endExtendX = rp.x + Math.cos(rp.dir) * extendDist;
            let endExtendY = rp.y + Math.sin(rp.dir) * extendDist;
            branchNodes.push({ x: endExtendX, y: endExtendY });

            if (branchNodes.length < 3) continue;
            let bPath = buildTrackPath(branchNodes, false);
            if (bPath.length < 10) continue;

            let bHalf = BRANCH_WIDTH / 2;
            let bLeft = [], bRight = [];
            for (let p of bPath) {
                bLeft.push({ x: p.x + p.nx * bHalf, y: p.y + p.ny * bHalf });
                bRight.push({ x: p.x - p.nx * bHalf, y: p.y - p.ny * bHalf });
            }

            let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
            for (let p of bPath) {
                if (p.x < minX) minX = p.x;
                if (p.x > maxX) maxX = p.x;
                if (p.y < minY) minY = p.y;
                if (p.y > maxY) maxY = p.y;
            }

            branchPaths.push({ path: bPath, leftEdge: bLeft, rightEdge: bRight, startIdx: startIdx, endIdx: rejoinIdx });
            branchBounds.push({ minX: minX - BRANCH_WIDTH, maxX: maxX + BRANCH_WIDTH, minY: minY - BRANCH_WIDTH, maxY: maxY + BRANCH_WIDTH });
            usedZones.push(startIdx);
            break;
        }
    }
}

// ==================== SCENERY ====================
function isNearBranch(x, y, margin) {
    for (let i = 0; i < branchPaths.length; i++) {
        let bb = branchBounds[i];
        if (!bb) continue;
        let expandedMargin = BRANCH_WIDTH / 2 + margin;
        if (x < bb.minX - margin || x > bb.maxX + margin || y < bb.minY - margin || y > bb.maxY + margin) continue;
        
        let bp = branchPaths[i];
        if (!bp.path) continue;
        for (let j = 0; j < bp.path.length; j += 2) {
            let dx = x - bp.path[j].x;
            let dy = y - bp.path[j].y;
            if (dx * dx + dy * dy < expandedMargin ** 2) return true;
        }
    }
    return false;
}

function isNearLake(x, y, margin) {
    for (let item of sceneryItems) {
        if (item.type === 'lake') {
            let dx = x - item.x;
            let dy = y - item.y;
            let maxR = Math.max(item.rx, item.ry) + margin;
            if (dx * dx + dy * dy < maxR * maxR) return true;
        }
    }
    return false;
}

function isInSelfIntersectionZone(x, y, margin) {
    if (selfIntersectionZones.length === 0) return false;
    
    // Find closest track point
    let closest = findClosestTrackPoint(x, y);
    let idx = closest.index;
    
    // Check if this index is in any self-intersection zone
    for (let zone of selfIntersectionZones) {
        if (idx >= zone.start - margin && idx <= zone.end + margin) {
            return true;
        }
    }
    return false;
}

// ==================== SCENERY SPATIAL GRID ====================
const SCENERY_GRID_SIZE = 400;
let sceneryGrid = {};

function sceneryGridKey(x, y) {
    return Math.floor(x / SCENERY_GRID_SIZE) + "_" + Math.floor(y / SCENERY_GRID_SIZE);
}

function buildSceneryGrid() {
    sceneryGrid = {};
    for (let i = 0; i < sceneryItems.length; i++) {
        let item = sceneryItems[i];
        let key = sceneryGridKey(item.x, item.y);
        if (!sceneryGrid[key]) sceneryGrid[key] = [];
        sceneryGrid[key].push(i);
    }
}

function getSceneryNear(x, y, radius) {
    let result = [];
    let gxMin = Math.floor((x - radius) / SCENERY_GRID_SIZE);
    let gxMax = Math.floor((x + radius) / SCENERY_GRID_SIZE);
    let gyMin = Math.floor((y - radius) / SCENERY_GRID_SIZE);
    let gyMax = Math.floor((y + radius) / SCENERY_GRID_SIZE);
    for (let gx = gxMin; gx <= gxMax; gx++) {
        for (let gy = gyMin; gy <= gyMax; gy++) {
            let cell = sceneryGrid[gx + "_" + gy];
            if (cell) {
                for (let j = 0; j < cell.length; j++) {
                    result.push(sceneryItems[cell[j]]);
                }
            }
        }
    }
    return result;
}

function generateScenery() {
    sceneryItems = [];
    let step = Math.max(1, Math.floor(trackPath.length / 1200));

    // First pass: generate lakes only
    for (let i = 0; i < trackPath.length; i += step * 3) {
        let p = trackPath[i];
        for (let side = -1; side <= 1; side += 2) {
            if (Math.random() < 0.85) continue;
            if (Math.random() < 0.12 && !isNearBranch(p.x, p.y, 100)) {
                let ld = TRACK_WIDTH / 2 + randRange(150, 500);
                let lx = p.x + p.nx * ld * side;
                let ly = p.y + p.ny * ld * side;
                if (!isNearBranch(lx, ly, 180) && !isNearLake(lx, ly, 250)) {
                    sceneryItems.push({ type: 'lake',
                        x: lx, y: ly,
                        rx: randRange(120, 320), ry: randRange(80, 200), angle: p.dir + randRange(-0.5, 0.5) });
                }
            }
        }
    }

    // Second pass: generate trees and people, avoiding lakes
    for (let i = 0; i < trackPath.length; i += step) {
        let p = trackPath[i];
        for (let side = -1; side <= 1; side += 2) {
            if (Math.random() < 0.02) continue;
            let offsetDist = TRACK_WIDTH / 2 + randRange(40, 320);
            let sx = p.x + p.nx * offsetDist * side;
            let sy = p.y + p.ny * offsetDist * side;

            if (isNearBranch(sx, sy, 80)) continue;
            if (isInSelfIntersectionZone(sx, sy, 2)) continue;

            let closestPt = findClosestTrackPoint(sx, sy);
            let distToTrack = Math.abs(getTrackDistance(sx, sy, closestPt.index));
            if (distToTrack < TRACK_WIDTH / 2 + 15) continue;

            let r = Math.random();
            if (r < 0.92) {
                if (!isNearLake(sx, sy, 50)) {
                    let shade = randRange(0.7, 1.0);
                    sceneryItems.push({ type: 'tree', x: sx, y: sy, size: randRange(20, 40), shade: shade,
                        cachedColor: 'rgba(46,' + Math.floor(139 * shade) + ',56,0.9)' });
                }
            } else {
                if (!isNearLake(sx, sy, 100)) {
                    let count = randInt(4, 9);
                    let people = [];
                    for (let pp = 0; pp < count; pp++) {
                        people.push({ dx: randRange(-18, 18), dy: randRange(-18, 18),
                            color: ['#e74c3c','#3498db','#2ecc71','#f1c40f','#9b59b6','#e67e22','#1abc9c'][randInt(0,6)] });
                    }
                    sceneryItems.push({ type: 'people', x: sx, y: sy, people: people });
                }
            }
        }
    }

    // Safety pass: remove any tree/people that ended up overlapping road or branch
    let safeItems = [];
    for (let i = 0; i < sceneryItems.length; i++) {
        let item = sceneryItems[i];
        if (item.type === 'lake') { safeItems.push(item); continue; }
        let cp = findClosestTrackPoint(item.x, item.y);
        let td = Math.abs(getTrackDistance(item.x, item.y, cp.index));
        if (td < TRACK_WIDTH / 2 + 10) continue;
        if (isOnBranch(item.x, item.y)) continue;
        safeItems.push(item);
    }
    sceneryItems = safeItems;

    // Add extra people near start and finish lines
    const startFinishRange = 150; // distance in meters
    const startIdx = 0;
    const finishIdx = trackPath.length - 1;

    // Start line area
    for (let i = Math.max(0, startIdx - 5); i <= Math.min(trackPath.length - 1, startIdx + 5); i++) {
        let p = trackPath[i];
        for (let side = -1; side <= 1; side += 2) {
            if (Math.random() < 0.3) continue;
            let offsetDist = TRACK_WIDTH / 2 + randRange(60, 200);
            let sx = p.x + p.nx * offsetDist * side;
            let sy = p.y + p.ny * offsetDist * side;

            if (isNearBranch(sx, sy, 80)) continue;
            if (isInSelfIntersectionZone(sx, sy, 2)) continue;

            let closestPt = findClosestTrackPoint(sx, sy);
            let distToTrack = Math.abs(getTrackDistance(sx, sy, closestPt.index));
            if (distToTrack < TRACK_WIDTH / 2 + 15) continue;

            if (!isNearLake(sx, sy, 100)) {
                let count = randInt(6, 12);
                let people = [];
                for (let pp = 0; pp < count; pp++) {
                    people.push({ dx: randRange(-25, 25), dy: randRange(-25, 25),
                        color: ['#e74c3c','#3498db','#2ecc71','#f1c40f','#9b59b6','#e67e22','#1abc9c'][randInt(0,6)] });
                }
                sceneryItems.push({ type: 'people', x: sx, y: sy, people: people });
            }
        }
    }

    // Finish line area
    for (let i = Math.max(0, finishIdx - 5); i <= Math.min(trackPath.length - 1, finishIdx + 5); i++) {
        let p = trackPath[i];
        for (let side = -1; side <= 1; side += 2) {
            if (Math.random() < 0.3) continue;
            let offsetDist = TRACK_WIDTH / 2 + randRange(60, 200);
            let sx = p.x + p.nx * offsetDist * side;
            let sy = p.y + p.ny * offsetDist * side;

            if (isNearBranch(sx, sy, 80)) continue;
            if (isInSelfIntersectionZone(sx, sy, 2)) continue;

            let closestPt = findClosestTrackPoint(sx, sy);
            let distToTrack = Math.abs(getTrackDistance(sx, sy, closestPt.index));
            if (distToTrack < TRACK_WIDTH / 2 + 15) continue;

            if (!isNearLake(sx, sy, 100)) {
                let count = randInt(6, 12);
                let people = [];
                for (let pp = 0; pp < count; pp++) {
                    people.push({ dx: randRange(-25, 25), dy: randRange(-25, 25),
                        color: ['#e74c3c','#3498db','#2ecc71','#f1c40f','#9b59b6','#e67e22','#1abc9c'][randInt(0,6)] });
                }
                sceneryItems.push({ type: 'people', x: sx, y: sy, people: people });
            }
        }
    }

    // Add trees outside start and finish lines (beyond the track)
    // Start line outer trees - before the start line in a circular arc
    let startP = trackPath[startIdx];
    let startDir = startP.dir;
    
    // Circular arc around start line
    const startArcRadius = 250;
    const startTreeCount = 18;
    
    for (let i = 0; i < startTreeCount; i++) {
        // Calculate angle for circular distribution
        let angleOffset = (i / startTreeCount) * Math.PI * 1.5 - Math.PI * 0.75; // 135-degree arc
        let angle = startDir + Math.PI + angleOffset; // Opposite direction of track
        
        let distance = startArcRadius + randRange(-50, 50); // Slight variation in distance
        let sx = startP.x + Math.cos(angle) * distance;
        let sy = startP.y + Math.sin(angle) * distance;
        
        // Ensure trees are outside track
        let closest = findClosestTrackPoint(sx, sy);
        let distToTrack = Math.abs(getTrackDistance(sx, sy, closest.index));
        if (distToTrack < TRACK_WIDTH / 2 + 30) continue; // Keep trees outside track
        
        // Skip if tree would overlap with road
        if (distToTrack < TRACK_WIDTH / 2 + 40) continue;
        
        let shade = randRange(0.7, 1.0);
        let size = randRange(25, 50);
        sceneryItems.push({ type: 'tree', x: sx, y: sy, size: size, shade: shade,
            cachedColor: 'rgba(46,' + Math.floor(139 * shade) + ',56,0.9)' });
    }

    // Finish line outer trees - beyond the finish line in a circular arc
    let finishP = trackPath[finishIdx];
    let finishDir = finishP.dir;
    
    // Circular arc around finish line (expanded)
    const finishArcRadius = 400; // Increased radius to 400
    const finishTreeCount = 24; // Increased tree count
    
    for (let i = 0; i < finishTreeCount; i++) {
        // Calculate angle for circular distribution - expanded arc
        let angleOffset = (i / finishTreeCount) * Math.PI * 2 - Math.PI; // 180-degree arc (semi-circle)
        let angle = finishDir + angleOffset; // Same direction as track
        
        let distance = finishArcRadius + randRange(-100, 100); // More variation in distance
        let sx = finishP.x + Math.cos(angle) * distance;
        let sy = finishP.y + Math.sin(angle) * distance;
        
        // Ensure trees are outside track
        let closest = findClosestTrackPoint(sx, sy);
        let distToTrack = Math.abs(getTrackDistance(sx, sy, closest.index));
        if (distToTrack < TRACK_WIDTH / 2 + 50) continue; // Keep trees further outside track
        
        // Skip if tree would overlap with road
        if (distToTrack < TRACK_WIDTH / 2 + 60) continue;
        
        let shade = randRange(0.7, 1.0);
        let size = randRange(25, 55); // Slightly larger trees
        sceneryItems.push({ type: 'tree', x: sx, y: sy, size: size, shade: shade,
            cachedColor: 'rgba(46,' + Math.floor(139 * shade) + ',56,0.9)' });
    }

    // Add sparse trees in empty areas of the map
    // First, calculate track bounds to know where to generate trees
    let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
    for (let p of trackPath) {
        if (p.x < minX) minX = p.x;
        if (p.x > maxX) maxX = p.x;
        if (p.y < minY) minY = p.y;
        if (p.y > maxY) maxY = p.y;
    }
    
    // Expand bounds to cover more area
    let padding = 1000;
    minX -= padding;
    maxX += padding;
    minY -= padding;
    maxY += padding;
    
    // Generate sparse trees in empty areas
    const sparseTreeAttempts = 800; // Number of attempts to place trees (increased for denser trees)
    const minTreeDistance = 100; // Minimum distance between trees (decreased for denser trees)
    
    for (let i = 0; i < sparseTreeAttempts; i++) {
        // Random position within bounds
        let sx = randRange(minX, maxX);
        let sy = randRange(minY, maxY);
        
        // Check distance to track
        let closest = findClosestTrackPoint(sx, sy);
        let distToTrack = Math.abs(getTrackDistance(sx, sy, closest.index));
        if (distToTrack < TRACK_WIDTH / 2 + 100) continue; // Keep away from track
        
        // Check if on branch
        if (isOnBranch(sx, sy)) continue;
        
        // Check distance to other scenery items
        let tooClose = false;
        for (let item of sceneryItems) {
            let dx = sx - item.x;
            let dy = sy - item.y;
            let dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < minTreeDistance) {
                tooClose = true;
                break;
            }
        }
        if (tooClose) continue;
        
        // Check if near lake
        if (isNearLake(sx, sy, 100)) continue;
        
        // Check if near branch
        if (isNearBranch(sx, sy, 100)) continue;
        
        // If all checks pass, add the tree
        let shade = randRange(0.7, 1.0);
        let size = randRange(20, 40);
        sceneryItems.push({ type: 'tree', x: sx, y: sy, size: size, shade: shade,
            cachedColor: 'rgba(46,' + Math.floor(139 * shade) + ',56,0.9)' });
    }

    buildSceneryGrid();
}

// ==================== CLOSEST TRACK POINT ====================
// Spatial grid index for fast track point queries
const TRACK_GRID_SIZE = 200;
let trackGrid = {};

function gridKey(x, y) {
    const gx = Math.floor(x / TRACK_GRID_SIZE);
    const gy = Math.floor(y / TRACK_GRID_SIZE);
    return gx + "_" + gy;
}

function buildTrackGrid() {
    trackGrid = {};
    for (let i = 0; i < trackPath.length; i++) {
        let p = trackPath[i];
        let key = gridKey(p.x, p.y);
        if (!trackGrid[key]) trackGrid[key] = [];
        trackGrid[key].push({ x: p.x, y: p.y, index: i });
    }
}

// Closest track point cache
let lastClosestCache = { x: 0, y: 0, index: 0, dist: Infinity };
const CACHE_RADIUS = 200;

// Optimized track point cache with larger radius and index-based validation
const TRACK_CACHE_RADIUS = 250;
const TRACK_CACHE_MAX_AGE = 3;
let trackCache = { x: 0, y: 0, index: 0, dist: Infinity, age: 0 };
let trackPointResult = { index: 0, dist: 0 };

function findClosestTrackPoint(x, y) {
    // Check if cached result is still valid
    let cacheDist = Math.sqrt((x - trackCache.x) ** 2 + (y - trackCache.y) ** 2);
    if (cacheDist < TRACK_CACHE_RADIUS && trackCache.dist < Infinity && trackCache.age < TRACK_CACHE_MAX_AGE) {
        trackCache.age++;
        trackPointResult.index = trackCache.index;
        trackPointResult.dist = trackCache.dist;
        return trackPointResult;
    }

    // Use spatial grid for fast lookup
    let gx = Math.floor(x / TRACK_GRID_SIZE);
    let gy = Math.floor(y / TRACK_GRID_SIZE);
    
    let bestDist = Infinity;
    let bestIdx = 0;
    
    // Check 9 neighboring cells
    for (let dx = -1; dx <= 1; dx++) {
        for (let dy = -1; dy <= 1; dy++) {
            let key = (gx + dx) + "_" + (gy + dy);
            let cell = trackGrid[key];
            if (!cell) continue;
            
            for (let pt of cell) {
                let ddx = x - pt.x;
                let ddy = y - pt.y;
                let d = ddx * ddx + ddy * ddy;
                if (d < bestDist) {
                    bestDist = d;
                    bestIdx = pt.index;
                }
            }
        }
    }
    
    // Fallback to coarse search if grid lookup failed
    if (bestDist === Infinity) {
        let coarseStep = 10;
        for (let i = 0; i < trackPath.length; i += coarseStep) {
            let dx = x - trackPath[i].x;
            let dy = y - trackPath[i].y;
            let d = dx * dx + dy * dy;
            if (d < bestDist) { bestDist = d; bestIdx = i; }
        }
        
        // Fine search around best coarse result
        let fineStart = Math.max(0, bestIdx - coarseStep);
        let fineEnd = Math.min(trackPath.length - 1, bestIdx + coarseStep);
        for (let i = fineStart; i <= fineEnd; i++) {
            let dx = x - trackPath[i].x;
            let dy = y - trackPath[i].y;
            let d = dx * dx + dy * dy;
            if (d < bestDist) { bestDist = d; bestIdx = i; }
        }
    }

    let finalDist = Math.sqrt(bestDist);
    trackCache.x = x;
    trackCache.y = y;
    trackCache.index = bestIdx;
    trackCache.dist = finalDist;
    trackCache.age = 0;
    lastClosestCache.x = x;
    lastClosestCache.y = y;
    lastClosestCache.index = bestIdx;
    lastClosestCache.dist = finalDist;
    trackPointResult.index = bestIdx;
    trackPointResult.dist = finalDist;
    return trackPointResult;
}

function getTrackDistance(x, y, idx) {
    let p = trackPath[idx];
    let dx = x - p.x;
    let dy = y - p.y;
    // Signed distance: positive = left side, negative = right side
    return dx * p.nx + dy * p.ny;
}

function isOnTrack(x, y) {
    let closest = findClosestTrackPoint(x, y);
    let trackDist = Math.abs(getTrackDistance(x, y, closest.index));
    if (trackDist < TRACK_WIDTH / 2) return true;
    // Check branch paths
    return isOnBranch(x, y);
}

// ==================== CAR FACTORY ====================
function createCar(color, isPlayer) {
    return {
        x: 0, y: 0,
        vx: 0, vy: 0,
        speed: 0,
        direction: 0,
        visualAngle: 0,
        steeringInput: 0, // smoothed steering for linear delay
        width: CAR_WIDTH,
        length: CAR_LENGTH,
        color: color,
        isPlayer: isPlayer,
        isNPC: !isPlayer,
        maxSpeed: isPlayer ? 10.0 : randRange(5.5, 11.0), // Increased for 220 max speed (10.0 corresponds to 220 km/h)
        acceleration: isPlayer ? 0.08 : randRange(0.05, 0.09),
        braking: 0.10,
        turnRate: isPlayer ? 0.05 : 0.055,
