        friction: 0.995,
        offTrackFriction: 0.98,
        currentPathIdx: 0,
        lastCheckpoint: 0,
        finished: false,
        finishTime: 0,
        totalProgress: 0,
        lastTireScreech: 0,
        collisionCooldown: 0,
        collisionPenalty: 0, // slows acceleration recovery after collision
        avoidPlayer: Math.random() < 0.6,
        npcSteerInput: 0 // Smoothed steering for NPC
    };
}

// ==================== PLACE CARS (PLAYER + NPC TRAFFIC) ====================
let npcSpawnTimer = 0;
let npcSpawnStarted = false;

// Initialize NPC pool - create all NPC cars upfront
function initNPCPool() {
    npcPool = [];
    activeNPCs = [];
    npcAudioNodes = [];
    for (let i = 0; i < NPC_MAX_COUNT; i++) {
        let color = COLORS.npcCars[Math.floor(Math.random() * COLORS.npcCars.length)];
        let npc = createCar(color, false);
        npc.active = false;
        npc.audioIndex = i;
        npcPool.push(npc);
        npcAudioNodes.push(null);
    }
}

function placeCars() {
    cars = [];
    let startIdx = 5;

    let pCar = createCar(COLORS.playerCar, true);
    let sp = trackPath[startIdx];
    pCar.x = sp.x; pCar.y = sp.y;
    pCar.direction = sp.dir; pCar.visualAngle = sp.dir;
    pCar.currentPathIdx = startIdx;
    player = pCar;
    cars.push(pCar);
    playerPrevX = pCar.x; playerPrevY = pCar.y;
    
    // Initialize NPC pool
    initNPCPool();
    
    npcSpawnTimer = 0;
    npcSpawnStarted = false;
}

function spawnNPCNearPlayer() {
    if (!player) return;

    // Get inactive NPC from pool instead of creating new one
    let npc = null;
    for (let i = 0; i < npcPool.length; i++) {
        if (!npcPool[i].active) {
            npc = npcPool[i];
            break;
        }
    }
    if (!npc) return; // Pool exhausted

    let forwardDist = randRange(NPC_SPAWN_DISTANCE * 0.5, NPC_SPAWN_DISTANCE);
    let backwardDist = randRange(NPC_SPAWN_DISTANCE * 0.3, NPC_SPAWN_DISTANCE * 0.7);

    let pathLength = trackPath.length;
    let playerIdx = player.currentPathIdx;
    let spawnIdx;

    // Try multiple positions to find one far enough from other NPCs
    let minNPCSeparation = 250; // minimum distance between NPCs
    let minSepSq = minNPCSeparation * minNPCSeparation;
    let placed = false;

    for (let attempt = 0; attempt < 6; attempt++) {
        let isBehind = Math.random() >= 0.7; // 30% spawn behind player
        if (!isBehind) {
            let idxOffset = Math.floor(forwardDist / 10) + randInt(-20, 20);
            spawnIdx = Math.min(playerIdx + idxOffset, pathLength - 50);
        } else {
            let idxOffset = Math.floor(backwardDist / 10) + randInt(-20, 20);
            spawnIdx = Math.max(playerIdx - idxOffset, 20);
        }
        spawnIdx = clamp(spawnIdx, 20, pathLength - 50);

        // Avoid spawning near finish line
        if (Math.abs(spawnIdx - (pathLength - 1)) < 100) {
            continue; // Skip finish line area
        }

        let np = trackPath[spawnIdx];
        
        // Detect curve intensity by checking direction change over nearby points
        let curveIntensity = 0;
        let lookAhead = 15;
        let lookBehind = 15;
        if (spawnIdx > lookBehind && spawnIdx < pathLength - lookAhead) {
            let prevDir = trackPath[spawnIdx - lookBehind].dir;
            let nextDir = trackPath[spawnIdx + lookAhead].dir;
            curveIntensity = Math.abs(angleDiff(prevDir, nextDir));
        }
        
        // Reduce lateral offset on curves to prevent spawning on edges
        let maxLateralOffset;
        if (curveIntensity > 0.8) {
            // Sharp curve - very limited offset
            maxLateralOffset = TRACK_WIDTH * 0.08;
        } else if (curveIntensity > 0.4) {
            // Medium curve - reduced offset
            maxLateralOffset = TRACK_WIDTH * 0.15;
        } else {
            // Straight or gentle curve - normal offset
            maxLateralOffset = TRACK_WIDTH * 0.25;
        }
        
        let lateralOffset = randRange(-maxLateralOffset, maxLateralOffset);
        let candX = np.x + np.nx * lateralOffset;
        let candY = np.y + np.ny * lateralOffset;

        // Check distance to all active NPCs
        let tooClose = false;
        for (let other of activeNPCs) {
            let ddx = candX - other.x;
            let ddy = candY - other.y;
            if (ddx * ddx + ddy * ddy < minSepSq) {
                tooClose = true;
                break;
            }
        }

        if (!tooClose) {
            // Reject if spawn position is visible on screen (prevents flash-in)
            if (isInViewBounds(candX, candY, 100)) {
                // Try further away next attempt
                forwardDist = randRange(NPC_SPAWN_DISTANCE * 0.8, NPC_SPAWN_DISTANCE * 1.3);
                backwardDist = randRange(NPC_SPAWN_DISTANCE * 0.6, NPC_SPAWN_DISTANCE * 1.0);
                continue;
            }

            npc.x = candX;
            npc.y = candY;
            npc.direction = np.dir;
            npc.visualAngle = np.dir;
            npc.currentPathIdx = spawnIdx;
            // Rear-spawned NPCs start at high speed to catch up naturally
            if (isBehind) {
                npc.speed = npc.maxSpeed * randRange(0.85, 1.0);
            } else {
                npc.speed = npc.maxSpeed * randRange(0.5, 0.85);
            }
            npc.collisionPenalty = 0;
            npc.active = true;
            activeNPCs.push(npc);
            placed = true;
            break;
        }

        // Vary distances for next attempt
        forwardDist = randRange(NPC_SPAWN_DISTANCE * 0.4, NPC_SPAWN_DISTANCE * 1.1);
        backwardDist = randRange(NPC_SPAWN_DISTANCE * 0.2, NPC_SPAWN_DISTANCE * 0.8);
    }
    // If no valid position found after all attempts, skip this spawn cycle
}

let npcDensityTimer = 0;

function updateNPCSpawning() {
    if (!player) return;
    
    // Stop spawning NPCs after player finishes
    if (player.finished) return;

    if (!npcSpawnStarted) {
        npcSpawnTimer++;
        if (npcSpawnTimer < NPC_START_DELAY) return;
        if (player.currentPathIdx < 30) return;
        npcSpawnStarted = true;
        npcTargetCount = NPC_COUNT_MIN + randInt(0, 1); // start with 2-3
        let spawnCount = Math.min(npcTargetCount, npcPool.length);
        for (let i = 0; i < spawnCount; i++) {
            spawnNPCNearPlayer();
        }
        return;
    }

    // Periodically adjust target NPC count (every ~5 seconds at 60fps)
    npcDensityTimer++;
    if (npcDensityTimer > 300) {
        npcDensityTimer = 0;
        // Random target within range, biased toward lower end
        let r = Math.random();
        // 60% chance low (2-3), 30% chance mid (3-4), 10% chance high (4-5)
        if (r < 0.6) npcTargetCount = NPC_COUNT_MIN + randInt(0, 1);
        else if (r < 0.9) npcTargetCount = NPC_COUNT_MIN + randInt(1, 2);
        else npcTargetCount = NPC_COUNT_MAX;
    }

    // Despawn NPCs that are too far - use swap remove for O(1) removal
    for (let i = activeNPCs.length - 1; i >= 0; i--) {
        let car = activeNPCs[i];

        let dx = car.x - player.x;
        let dy = car.y - player.y;
        let dist = Math.sqrt(dx * dx + dy * dy);

        if (dist > NPC_DESPAWN_DISTANCE) {
            car.active = false;
            car.finished = false; // Reset finished state when despawned
            car.finishTime = 0; // Reset finish time
            let lastIdx = activeNPCs.length - 1;
            if (i !== lastIdx) {
                activeNPCs[i] = activeNPCs[lastIdx];
            }
            activeNPCs.pop();
        }
    }

    // Spawn new NPCs if below dynamic target
    if (activeNPCs.length < npcTargetCount) {
        spawnNPCNearPlayer();
    }

    // Update cars array in place instead of creating new array
    cars.length = 1;
    cars[0] = player;
    for (let npc of activeNPCs) {
        cars.push(npc);
    }
}

// ==================== PLAYER UPDATE ====================
function updatePlayer(car, dt) {
    if (car.collisionCooldown > 0) car.collisionCooldown -= dt;
    if (car.collisionPenalty > 0) car.collisionPenalty -= dt;

    let inputUp = keys['ArrowUp'] || keys['KeyW'] || touchControls.up;
    let inputDown = keys['ArrowDown'] || keys['KeyS'] || touchControls.down;
    let inputLeft = keys['ArrowLeft'] || keys['KeyA'] || touchControls.left;
    let inputRight = keys['ArrowRight'] || keys['KeyD'] || touchControls.right;

    // Post-finish: allow control but gradually reduce speed to a stop
    let effectiveMaxSpeed = car.maxSpeed;
    let postFinishDeceleration = false;
    if (car.finished) {
        let elapsed = raceTime - car.finishTime;
        // Immediate strong deceleration after finish
        if (elapsed > 0.5) {
            let brakeFactor = clamp((elapsed - 0.5) / 2, 0, 1);
            effectiveMaxSpeed = car.maxSpeed * (1 - brakeFactor * 0.95);
            if (!inputUp) {
                car.speed *= lerp(0.97, 0.70, brakeFactor); // Stronger deceleration
                postFinishDeceleration = true;
            }
        }
        if (elapsed > 2.5) {
            car.speed *= 0.65; // Much faster deceleration
            postFinishDeceleration = true;
            if (Math.abs(car.speed) < 0.05) car.speed = 0;
        }
    }

    // Acceleration with collision penalty: slower recovery after crashes
    let accelMult = 1;
    if (car.collisionPenalty > 0) {
        accelMult = 0.5 + 0.5 * (1 - clamp(car.collisionPenalty / 1.0, 0, 1));
    }

    if (inputUp) {
        let accelFactor = 1 - (car.speed / effectiveMaxSpeed) * 0.5;
        
        // Slow down acceleration linearly above 160 speed (corresponds to ~7.11 in game units)
        let speed160 = 7.11;
        if (car.speed > speed160) {
            // Calculate linear slowdown factor (from 0.6 to 0.1 as speed approaches max)
            let excessSpeed = car.speed - speed160;
            let maxExcess = car.maxSpeed - speed160;
            let slowdownFactor = 0.6 - (excessSpeed / maxExcess) * 0.5;
            accelFactor *= slowdownFactor;
        }
        
        car.speed += car.acceleration * accelFactor * accelMult;
    } else if (inputDown) {
        car.speed -= car.braking;
    } else if (!postFinishDeceleration) {
        car.speed *= car.friction;
    }
    car.speed = clamp(car.speed, -effectiveMaxSpeed * 0.175, effectiveMaxSpeed);

    // Turning: speed-dependent steering with moderate high-speed penalty
    let speedRatio = Math.abs(car.speed) / car.maxSpeed;
    // Smoother curve: good at mid-speed, stronger reduction at high speed
    let turnFactor = speedRatio * Math.max(0.2, 1.0 - speedRatio * speedRatio * 0.85);

    // Target steering input: -1 (left), 0 (center), +1 (right)
    let targetSteer = 0;
    if (inputLeft) targetSteer = -1;
    if (inputRight) targetSteer = 1;

    // Linear delay: smooth steering ramp
    let steerSmooth = 0.18;
    car.steeringInput += (targetSteer - car.steeringInput) * steerSmooth;
    // Snap to zero when nearly centered to avoid drift
    if (Math.abs(car.steeringInput) < 0.01 && targetSteer === 0) car.steeringInput = 0;

    let turnAmount = car.steeringInput * car.turnRate * turnFactor;

    car.direction += turnAmount;
    car.direction = normalizeAngle(car.direction);

    // Move
    car.x += Math.cos(car.direction) * car.speed;
    car.y += Math.sin(car.direction) * car.speed;

    // Brake sound when braking at speed
    if (inputDown && Math.abs(car.speed) > car.maxSpeed * 0.3) {
        let brakeIntensity = Math.abs(car.speed) / car.maxSpeed;
        playBrakeSound(brakeIntensity);
    } else {
        stopBrakeSound();
    }

    // Visual angle interpolation (smooth)
    let angleDelta = angleDiff(car.visualAngle, car.direction);
    car.visualAngle += angleDelta * 0.2;

    // Update engine sound
    updateEngineSound(car.speed, car.maxSpeed);

    // Track index - compute once and reuse
    let closest = findClosestTrackPoint(car.x, car.y);
    car.currentPathIdx = closest.index;

    // Off-track friction + dust - use already computed closest point
    let trackDist = Math.abs(getTrackDistance(car.x, car.y, closest.index));
    let onTrack = trackDist < TRACK_WIDTH / 2 || isOnBranch(car.x, car.y);
    if (!onTrack) {
        car.speed *= car.offTrackFriction;
        if (Math.abs(car.speed) > 1 && Math.random() < 0.5) {
            spawnDust(car.x, car.y, car.speed, car.direction);
        }
    }

    // Track distance traveled (stop counting after finish)
    let ddx = car.x - playerPrevX, ddy = car.y - playerPrevY;
    if (!car.finished) {
        totalDistance += Math.sqrt(ddx * ddx + ddy * ddy);
    }
    playerPrevX = car.x; playerPrevY = car.y;
}

// ==================== NPC UPDATE ====================
const NPC_ACTIVE_DISTANCE = 500;
const NPC_SIMPLE_DISTANCE = 800;

function updateNPC(car, dt, isPlayerNearby) {
    if (car.collisionCooldown > 0) car.collisionCooldown -= dt;
    
    // Apply finish line slowdown for NPCs only after they finish
    if (car.finished) {
        // NPCs after finish line slow down with smooth linear deceleration
        let elapsed = raceTime - car.finishTime;
        
        // Strong linear deceleration over 1.5 seconds
        if (elapsed < 1.5) {
            // Gradually increase braking from 0.94 to 0.70 over 1.5 seconds
            let brakeFactor = elapsed / 1.5;
            car.speed *= lerp(0.94, 0.70, brakeFactor);
        } else {
            // Final strong braking to stop quickly
            car.speed *= 0.65;
        }
        
        // Only stop completely when speed is very low
        if (Math.abs(car.speed) < 0.1) {
            car.speed = 0;
        } else {
            // Continue moving while decelerating
            car.x += Math.cos(car.direction) * car.speed;
            car.y += Math.sin(car.direction) * car.speed;
        }
        
        // Keep finished NPCs near finish line
        let finishP = trackPath[trackPath.length - 1];
        let dx = car.x - finishP.x;
        let dy = car.y - finishP.y;
        let dist = Math.sqrt(dx * dx + dy * dy);
        
        // If finished NPC is too far from finish line, move it back
        if (dist > 300) {
            let angle = Math.atan2(dy, dx);
            let targetX = finishP.x + Math.cos(angle) * 250;
            let targetY = finishP.y + Math.sin(angle) * 250;
            
            // Smoothly move back to finish area
            car.x += (targetX - car.x) * 0.05;
            car.y += (targetY - car.y) * 0.05;
        }
        
        // Stop AI behavior only when completely stopped
        if (car.speed === 0) {
            return;
        }
    }
    
    // Skip update if player is too far
    if (!isPlayerNearby) {
        // Simple movement: follow track direction
        let closest = findClosestTrackPoint(car.x, car.y);
        car.currentPathIdx = closest.index;
        
        // Follow track direction instead of cutting to target
        let trackDir = trackPath[closest.index].dir;
        let steerAngle = angleDiff(car.direction, trackDir);
        
        // Lateral correction - only when near edges
        let lateralDist = getTrackDistance(car.x, car.y, closest.index);
        let absLateralDist = Math.abs(lateralDist);
        let lateralCorrection = 0;
        if (absLateralDist > TRACK_WIDTH * 0.35) {
            lateralCorrection = -lateralDist / (TRACK_WIDTH * 0.5) * 0.3;
        }
        
        // Smooth steering for distant NPC
        let maxTurn = car.turnRate * 0.7;
        let desiredTurn = steerAngle * 0.5 + lateralCorrection;
        let targetSteerInput = clamp(desiredTurn / maxTurn, -1, 1);
        let steerSmooth = 0.1;
        car.npcSteerInput += (targetSteerInput - car.npcSteerInput) * steerSmooth;
        car.direction += car.npcSteerInput * maxTurn;
        car.direction = normalizeAngle(car.direction);
        
        // Maintain moderate speed
        let targetSpeed = car.maxSpeed * 0.6;
        if (car.speed < targetSpeed) car.speed += car.acceleration * 0.3;
        else car.speed *= 0.995;
        car.speed = clamp(car.speed, 0, car.maxSpeed);
        
        car.x += Math.cos(car.direction) * car.speed;
        car.y += Math.sin(car.direction) * car.speed;
        
        let ad = angleDiff(car.visualAngle, car.direction);
        car.visualAngle += ad * 0.1;
        return;
    }

    // Full update when player is nearby
    let closest = findClosestTrackPoint(car.x, car.y);
    car.currentPathIdx = closest.index;
    
    // Use already computed closest point for on-track check
    let trackDist = getTrackDistance(car.x, car.y, closest.index);
    let absTrackDist = Math.abs(trackDist);
    let onTrack = absTrackDist < TRACK_WIDTH / 2;
    if (!onTrack) onTrack = isOnBranch(car.x, car.y);
    let speedRatio = Math.abs(car.speed) / car.maxSpeed;

    // Detect curve intensity for better cornering
    let curveIntensity = 0;
    let checkIdx = Math.max(0, closest.index - 10);
    let checkEndIdx = Math.min(trackPath.length - 1, closest.index + 10);
    if (checkEndIdx > checkIdx + 2) {
        let prevDir = trackPath[checkIdx].dir;
        let nextDir = trackPath[checkEndIdx].dir;
        curveIntensity = Math.abs(angleDiff(prevDir, nextDir));
    }
    
    // Primary steering: follow track direction at current position
    // This keeps NPC aligned with the road rather than cutting corners
    let currentTrackPoint = trackPath[closest.index];
    let trackDirection = currentTrackPoint.dir;
    let steerAngle = angleDiff(car.direction, trackDirection);
    
    // Look ahead for upcoming curves - adjust direction anticipation
    let lookAhead = Math.floor(6 + speedRatio * 12);
    let targetIdx = Math.min(closest.index + lookAhead, trackPath.length - 1);
    let target = trackPath[targetIdx];
    
    // Blend current direction with look-ahead direction
    let lookAheadAngle = angleDiff(car.direction, target.dir);
    steerAngle = steerAngle * 0.6 + lookAheadAngle * 0.4;

    // Strong lateral correction to stay near center
    // This is the main mechanism to prevent cutting corners
    let lateralDist = trackDist;
    let centerPullStrength = 0.15; // Reduced to allow more freedom for overtaking
    if (curveIntensity > 0.3) {
        // On curves, pull stronger toward center
        centerPullStrength = 0.25;
    }
    // Only pull hard when near edges
    if (absTrackDist > TRACK_WIDTH * 0.35) {
        centerPullStrength *= 2; // Stronger pull when near edge
    }
    let lateralCorrection = -lateralDist / (TRACK_WIDTH * 0.5) * centerPullStrength;

    let avoidAngle = 0;
    let avoidStrength = 0;
    for (let other of cars) {
        if (other === car) continue;
        if (other.isPlayer && !car.avoidPlayer) continue;
        let odx = other.x - car.x;
        let ody = other.y - car.y;
        let dist = Math.sqrt(odx * odx + ody * ody);
        if (dist < 150 && dist > 0.1) {
            let angleToOther = Math.atan2(ody, odx);
            let relAngle = angleDiff(car.direction, angleToOther);
            if (Math.abs(relAngle) < Math.PI * 0.6) {
                let factor = (150 - dist) / 150;
                avoidStrength = Math.max(avoidStrength, factor);
                if (relAngle > 0) {
                    avoidAngle -= factor * 0.8;
                } else {
                    avoidAngle += factor * 0.8;
                }
            }
            if (dist < 80 && Math.abs(relAngle) < Math.PI * 0.3) {
                car.speed *= 0.95;
            }
        }
    }

    if (!onTrack) {
        // Off track - steer back toward center
        let trackCenter = trackPath[closest.index];
        let toCenterAngle = Math.atan2(trackCenter.y - car.y, trackCenter.x - car.x);
        steerAngle = angleDiff(car.direction, toCenterAngle);
        // Keep lateral correction active to pull back
    }

    // Smooth steering for NPC - prevents rapid head shaking
    let maxTurn = car.turnRate * Math.max(0.3, speedRatio);
    let desiredTurn = steerAngle * 0.5 + lateralCorrection + avoidAngle * avoidStrength;
    
    // Normalize desired turn to -1 to 1 range for smooth input
    let targetSteerInput = clamp(desiredTurn / maxTurn, -1, 1);
    
    // Smooth the steering input (similar to player)
    let steerSmooth = 0.12; // Slower than player for more natural feel
    car.npcSteerInput += (targetSteerInput - car.npcSteerInput) * steerSmooth;
    
    // Apply smoothed steering
    let turnAmount = car.npcSteerInput * maxTurn;
    car.direction += turnAmount;
    car.direction = normalizeAngle(car.direction);

    let targetSpeed = car.maxSpeed * 0.7;
    if (car.speed < targetSpeed) car.speed += car.acceleration * 0.5;
    else car.speed *= 0.99;
    car.speed = clamp(car.speed, 0, car.maxSpeed);

    car.x += Math.cos(car.direction) * car.speed;
    car.y += Math.sin(car.direction) * car.speed;

    if (!onTrack) {
        car.speed *= car.offTrackFriction;
    }

    let ad = angleDiff(car.visualAngle, car.direction);
    car.visualAngle += ad * 0.2;
}

// ==================== WALL COLLISION (SMOOTH BOUNCE - MATCHES CAR-CAR) ====================
function checkWallCollision(car) {
    if (isOnBranch(car.x, car.y)) return;
    
    // Skip wall collision in self-intersection zones
    if (isInSelfIntersectionZone(car.x, car.y, 10)) return;

    let closest = findClosestTrackPoint(car.x, car.y);
    let idx = closest.index;
    let halfW = TRACK_WIDTH / 2;
    let trackDist = getTrackDistance(car.x, car.y, idx);
    let absDist = Math.abs(trackDist);

    if (absDist < halfW - 10) return;

    // Iterate all walls without creating filtered array
    let carIdx = car.currentPathIdx;
    for (let wall of trackWalls) {
        // Skip walls too far from car
        if (carIdx > 0 && (carIdx < wall.minIdx - 50 || carIdx > wall.maxIdx + 50)) continue;
        
        if (idx >= wall.startIdx && idx <= wall.endIdx) {
            let wallApplies = false;
            if (wall.side === 'both') wallApplies = true;
            else if (wall.side === 'left' && trackDist > 0) wallApplies = true;
            else if (wall.side === 'right' && trackDist < 0) wallApplies = true;

            if (wallApplies && absDist > halfW - 12) {
                let p = trackPath[idx];
                let nx = trackDist > 0 ? -p.nx : p.nx;
                let ny = trackDist > 0 ? -p.ny : p.ny;

                let overlap = absDist - (halfW - 14);
                let pushStrength = Math.min(overlap * 0.4, 3);
                car.x += nx * pushStrength;
                car.y += ny * pushStrength;

                let vx = Math.cos(car.direction) * car.speed;
                let vy = Math.sin(car.direction) * car.speed;
                let dotN = vx * nx + vy * ny;

                if (dotN < 0) {
                    let restitution = 0.35;
                    let impulse = -(1 + restitution) * dotN;
                    impulse = Math.min(impulse, 2.5);

                    vx += impulse * nx;
                    vy += impulse * ny;

                    let newDir = Math.atan2(vy, vx);
                    let newSpeed = Math.sqrt(vx * vx + vy * vy);

                    let blendFactor = 0.5;
                    car.direction = car.direction + angleDiff(car.direction, newDir) * blendFactor;
                    car.direction = normalizeAngle(car.direction);

                    car.speed = lerp(Math.abs(car.speed), newSpeed, 0.5) * (car.speed >= 0 ? 1 : -1);
                    car.speed *= 0.75; // moderate speed loss on wall hit
                    car.speed = clamp(car.speed, -car.maxSpeed, car.maxSpeed);
                    car.collisionPenalty = 0.6; // seconds of reduced acceleration
                }

                if (car.collisionCooldown <= 0) {
                    playWallSound();
                    car.collisionCooldown = 0.1;
                }

                let maxWallSparks = Math.min(3, MAX_SPARKS - particleCounts.spark);
                for (let s = 0; s < maxWallSparks; s++) {
                    spawnSpark(car.x - nx * 5, car.y - ny * 5);
                }
                return;
            }
        }
    }
}

// ==================== TRACK BOUNDARY (SOFT PUSH-BACK) ====================
function isOnBranch(x, y) {
    // Check cache first
    let cdx = x - branchCache.x, cdy = y - branchCache.y;
    if (cdx * cdx + cdy * cdy < 2500 && branchCache.age < BRANCH_CACHE_MAX_AGE) {
        branchCache.age++;
        return branchCache.result;
    }

    let threshold = BRANCH_WIDTH / 2;
    let thresholdSq = threshold * threshold;
    let gx = Math.floor(x / BRANCH_GRID_SIZE);
    let gy = Math.floor(y / BRANCH_GRID_SIZE);

    for (let dx = -1; dx <= 1; dx++) {
        for (let dy = -1; dy <= 1; dy++) {
            let key = (gx + dx) + "_" + (gy + dy);
            let cell = branchGrid[key];
            if (!cell) continue;
            for (let pt of cell) {
                let ddx = x - pt.x, ddy = y - pt.y;
                if (ddx * ddx + ddy * ddy < thresholdSq) {
                    branchCache.x = x;
                    branchCache.y = y;
                    branchCache.result = true;
                    branchCache.age = 0;
                    return true;
                }
            }
        }
    }

    branchCache.x = x;
    branchCache.y = y;
    branchCache.result = false;
    branchCache.age = 0;
    return false;
}

// Pre-allocated result for getClosestBranchPoint
let closestBranchResult = { point: null, path: null, dist: Infinity, px: 0, py: 0, pnx: 0, pny: 0, pindex: 0 };

function getClosestBranchPoint(x, y) {
    let bestDist = Infinity;
    let bestPt = null;
    let bestPath = null;
    let bestIdx = 0;
    
    for (let bp of branchPaths) {
        if (!bp.path) continue;
        
        for (let i = 0; i < bp.path.length; i++) {
            let pt = bp.path[i];
            let dx = x - pt.x;
            let dy = y - pt.y;
            let d = dx * dx + dy * dy;
            if (d < bestDist) {
                bestDist = d;
                bestPt = pt;
                bestPath = bp;
                bestIdx = i;
            }
        }
    }
    
    if (bestPt) {
        closestBranchResult.point = bestPt;
        closestBranchResult.path = bestPath;
        closestBranchResult.dist = Math.sqrt(bestDist);
        closestBranchResult.px = bestPt.x;
        closestBranchResult.py = bestPt.y;
        closestBranchResult.pnx = bestPt.nx;
        closestBranchResult.pny = bestPt.ny;
        closestBranchResult.pindex = bestIdx;
        return closestBranchResult;
    }
    
    closestBranchResult.point = null;
    closestBranchResult.path = null;
    closestBranchResult.dist = Infinity;
    return closestBranchResult;
}

function enforceTrackBoundary(car) {
    if (car.isPlayer) return;

    // Branch boundary constraint removed - only main track constraint
    /*
    if (isOnBranch(car.x, car.y)) {
        let branchInfo = getClosestBranchPoint(car.x, car.y);
        if (branchInfo.point) {
            let dx = car.x - branchInfo.px;
            let dy = car.y - branchInfo.py;
            let lateralDist = dx * branchInfo.pnx + dy * branchInfo.pny;
            let absDist = Math.abs(lateralDist);
            let halfW = BRANCH_WIDTH / 2;
            
            if (absDist > halfW + 20) {
                let pushDir = lateralDist > 0 ? -1 : 1;
                let pushAmount = Math.min((absDist - halfW) * 0.08, 4);
                car.x += branchInfo.pnx * pushDir * pushAmount;
                car.y += branchInfo.pny * pushDir * pushAmount;
                car.speed *= 0.98;
            }
        }
        return;
    }
    */

    let closest = findClosestTrackPoint(car.x, car.y);
    let trackDist = getTrackDistance(car.x, car.y, closest.index);
    let absDist = Math.abs(trackDist);
    let halfW = TRACK_WIDTH / 2;

    // NPC: push back onto main track if off-road
    if (absDist > halfW + 30) {
        let p = trackPath[closest.index];
        let pushDir = trackDist > 0 ? -1 : 1;
        let pushAmount = Math.min((absDist - halfW) * 0.08, 5);
        car.x += p.nx * pushDir * pushAmount;
        car.y += p.ny * pushDir * pushAmount;
        car.speed *= 0.97;
    }
    // Hard cap for NPCs only: if very far off track, teleport back
    if (closest.dist > TRACK_WIDTH * 3) {
        let p = trackPath[closest.index];
        car.x = p.x;
        car.y = p.y;
        car.direction = p.dir;
        car.speed *= 0.3;
    }
}

// ==================== CAR-TO-CAR COLLISION (SMOOTH BOUNCE) ====================
function resolveCarCollisions() {
    for (let i = 0; i < cars.length; i++) {
        for (let j = i + 1; j < cars.length; j++) {
            let a = cars[i], b = cars[j];
            let dx = b.x - a.x;
            let dy = b.y - a.y;
            let d = Math.sqrt(dx * dx + dy * dy);
            let minDist = (CAR_WIDTH + CAR_LENGTH) / 2 * 0.7;

            if (d < minDist && d > 0.01) {
                // Collision normal
                let nx = dx / d;
                let ny = dy / d;

                // Strong separation to prevent sticking
                let overlap = minDist - d;
                let pushStrength = Math.max(overlap * 0.6, 2);
                a.x -= nx * pushStrength;
                a.y -= ny * pushStrength;
                b.x += nx * pushStrength;
                b.y += ny * pushStrength;

                // Velocity components along normal
                let avx = Math.cos(a.direction) * a.speed;
                let avy = Math.sin(a.direction) * a.speed;
                let bvx = Math.cos(b.direction) * b.speed;
                let bvy = Math.sin(b.direction) * b.speed;

                let aDotN = avx * nx + avy * ny;
                let bDotN = bvx * nx + bvy * ny;

                // Always resolve to unstick
                let relVel = aDotN - bDotN;
                if (relVel > -0.5) {
                    let restitution = 0.6;
                    let impulse = (1 + restitution) * Math.max(relVel, 0.5) / 2;
                    impulse = clamp(impulse, 1.0, 4.0);

                    avx -= impulse * nx;
                    avy -= impulse * ny;
                    bvx += impulse * nx;
                    bvy += impulse * ny;

                    let newDirA = Math.atan2(avy, avx);
                    let newDirB = Math.atan2(bvy, bvx);
                    let newSpeedA = Math.sqrt(avx * avx + avy * avy);
                    let newSpeedB = Math.sqrt(bvx * bvx + bvy * bvy);

                    let blendFactor = 0.7;
                    a.direction = a.direction + angleDiff(a.direction, newDirA) * blendFactor;
                    b.direction = b.direction + angleDiff(b.direction, newDirB) * blendFactor;
                    a.direction = normalizeAngle(a.direction);
                    b.direction = normalizeAngle(b.direction);

                    let minBounceSpeed = 2.0;
                    a.speed = lerp(Math.abs(a.speed), newSpeedA, 0.6) * (a.speed >= 0 ? 1 : -1);
                    b.speed = lerp(Math.abs(b.speed), newSpeedB, 0.6) * (b.speed >= 0 ? 1 : -1);
                    a.speed *= 0.85;
                    b.speed *= 0.85;
                    if (Math.abs(a.speed) < minBounceSpeed) a.speed = minBounceSpeed * (a.speed >= 0 ? 1 : -1);
                    if (Math.abs(b.speed) < minBounceSpeed) b.speed = minBounceSpeed * (b.speed >= 0 ? 1 : -1);
                    a.collisionPenalty = 0.4;
                    b.collisionPenalty = 0.4;

                    a.speed = clamp(a.speed, -a.maxSpeed, a.maxSpeed);
                    b.speed = clamp(b.speed, -b.maxSpeed, b.maxSpeed);

                    if (a.collisionCooldown <= 0 && b.collisionCooldown <= 0) {
                        // Only play collision sound if near player (performance + immersion)
                        let playSound = false;
                        if (player) {
                            let collisionDist = player ? Math.sqrt((a.x - player.x) ** 2 + (a.y - player.y) ** 2) : 0;
                            playSound = collisionDist < 500;
                        } else {
                            playSound = true;
                        }
                        
                        if (playSound) {
                            playCollisionSound();
                        }
                        a.collisionCooldown = 0.1;
                        b.collisionCooldown = 0.1;
                    }

                    // Fewer sparks with limit check - use counter instead of filter
                    let cx = (a.x + b.x) / 2;
                    let cy = (a.y + b.y) / 2;
                    let maxSparks = Math.min(4, MAX_SPARKS - particleCounts.spark);
                    for (let s = 0; s < maxSparks; s++) {
                        spawnSpark(cx, cy);
                    }
                }
            }
        }
    }
}

// ==================== SCENERY COLLISION ====================
function checkSceneryCollision(car) {
    // Skip scenery collision if car is on a branch road
    if (isOnBranch(car.x, car.y)) return;

    let nearby = getSceneryNear(car.x, car.y, 80);
    for (let i = 0; i < nearby.length; i++) {
        let item = nearby[i];
        if (item.type === 'lake') continue;

        let dx = car.x - item.x;
        let dy = car.y - item.y;

        let collisionRadius = item.type === 'tree' ? item.size * 0.45 : 12;
        let checkRadius = collisionRadius + 10;

        // Early exit if too far
        if (Math.abs(dx) > checkRadius || Math.abs(dy) > checkRadius) continue;

        // Now do precise distance check
        let dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < collisionRadius + 8 && dist > 0.01) {
            let nx = dx / dist;
            let ny = dy / dist;
            let overlap = collisionRadius + 8 - dist;
            let pushStrength = Math.min(overlap * 0.4, 3);
            car.x += nx * pushStrength;
            car.y += ny * pushStrength;
            let vx = Math.cos(car.direction) * car.speed;
            let vy = Math.sin(car.direction) * car.speed;
            let dotN = vx * nx + vy * ny;
            if (dotN < 0) {
                let restitution = 0.4;
                let impulse = -(1 + restitution) * dotN;
                impulse = Math.min(impulse, 3);
                vx += impulse * nx;
                vy += impulse * ny;
                let newDir = Math.atan2(vy, vx);
                let newSpeed = Math.sqrt(vx * vx + vy * vy);
                car.direction = car.direction + angleDiff(car.direction, newDir) * 0.5;
                car.direction = normalizeAngle(car.direction);
                car.speed = lerp(Math.abs(car.speed), newSpeed, 0.5) * (car.speed >= 0 ? 1 : -1);
                car.speed *= 0.75; // moderate speed loss on scenery hit
                car.collisionPenalty = 0.5;
            }
            if (car.isPlayer && car.collisionCooldown <= 0) {
                playWallSound();
                car.collisionCooldown = 0.1;
            }
            
            // Limit scenery spark particles
            let maxScenerySparks = Math.min(2, MAX_SPARKS - particleCounts.spark);
            for (let s = 0; s < maxScenerySparks; s++) {
                spawnSpark(car.x - nx * 10, car.y - ny * 10);
            }
        }
    }
}

// ==================== FINISH LINE COLLISION (PHYSICAL) ====================
let finishSoundsStopped = false;
let finishResultsShown = false;

function checkFinishLine() {
    let lastIdx = trackPath.length - 1;
    let fp = trackPath[lastIdx];
    let halfW = TRACK_WIDTH / 2;
    // Finish line segment endpoints
    let flx1 = fp.x + fp.nx * halfW, fly1 = fp.y + fp.ny * halfW;
    let flx2 = fp.x - fp.nx * halfW, fly2 = fp.y - fp.ny * halfW;
    
    // Check player
    if (player && !player.finished && !finishLineCrossed) {
        // Car front point
        let carFrontX = player.x + Math.cos(player.direction) * CAR_LENGTH * 0.4;
        let carFrontY = player.y + Math.sin(player.direction) * CAR_LENGTH * 0.4;
        if (segmentIntersect(playerPrevX, playerPrevY, carFrontX, carFrontY, flx1, fly1, flx2, fly2)) {
            if (player.currentPathIdx > trackPath.length * 0.7) {
                player.finished = true;
                player.finishTime = raceTime;
                finalRaceTime = raceTime;
                finalDistance = totalDistance;
                finishLineCrossed = true;
                finishSoundsStopped = false;
                finishResultsShown = false;
                PerfMonitor.endSession();
            }
        }
    }
    
    // Check NPCs
    for (let npc of activeNPCs) {
        if (!npc.finished) {
            let carFrontX = npc.x + Math.cos(npc.direction) * CAR_LENGTH * 0.4;
            let carFrontY = npc.y + Math.sin(npc.direction) * CAR_LENGTH * 0.4;
            // Store previous position for intersection check
            let npcPrevX = npc.x - Math.cos(npc.direction) * npc.speed;
            let npcPrevY = npc.y - Math.sin(npc.direction) * npc.speed;
            if (segmentIntersect(npcPrevX, npcPrevY, carFrontX, carFrontY, flx1, fly1, flx2, fly2)) {
                if (npc.currentPathIdx > trackPath.length * 0.7) {
                    npc.finished = true;
                    npc.finishTime = raceTime;
                }
            }
        }
    }
}

// Called each frame during racing to handle post-finish transitions
function updateFinishState() {
    if (!player || !player.finished) return;
    let elapsed = raceTime - player.finishTime;
    if (!finishSoundsStopped && elapsed > 3) {
        finishSoundsStopped = true;
        stopGameSounds();
    }
    // Show results overlay at 1s but keep racing state for coasting
    if (!finishResultsShown && elapsed > 1) {
        finishResultsShown = true;
    }
}

// ==================== PARTICLES ====================
// Particle pool system with free list for O(1) allocation
// Active set tracks which indices are active to avoid scanning all 800 slots
const MAX_PARTICLES = 800;
const MAX_SPARKS = 300;
const MAX_DUST = 200;
let particlePool = [];
let particleFreeList = []; // indices of free particles
let activeParticleSet = []; // indices of active particles
let particleCounts = { spark: 0, dust: 0, total: 0 };

function initParticlePool() {
    particlePool = [];
    particleFreeList = [];
    activeParticleSet = [];
    for (let i = 0; i < MAX_PARTICLES; i++) {
        particlePool.push({
            active: false,
            x: 0, y: 0,
            vx: 0, vy: 0,
            life: 0,
            decay: 0,
            size: 0,
            color: '',
            type: 'spark'
        });
        particleFreeList.push(i);
    }
    particleCounts = { spark: 0, dust: 0, total: 0 };
}
initParticlePool();

function allocateParticle() {
    if (particleFreeList.length === 0) return null;
    let idx = particleFreeList.pop();
    activeParticleSet.push(idx);
    return particlePool[idx];
}

function spawnSpark(x, y) {
    if (particleCounts.spark >= MAX_SPARKS) return;
    let p = allocateParticle();
    if (!p) return;
    p.active = true;
    p.x = x;
    p.y = y;
    p.vx = randRange(-4, 4);
    p.vy = randRange(-4, 4);
    p.life = 1;
    p.decay = randRange(0.03, 0.08);
    p.size = randRange(2, 5);
    p.color = COLORS.spark[randInt(0, COLORS.spark.length - 1)];
    p.type = 'spark';
    particleCounts.spark++;
    particleCounts.total++;
}

function spawnDust(x, y, speed, dir) {
    if (particleCounts.dust >= MAX_DUST) return;
    let p = allocateParticle();
    if (!p) return;
    p.active = true;
    p.x = x - Math.cos(dir) * CAR_LENGTH * 0.3;
    p.y = y - Math.sin(dir) * CAR_LENGTH * 0.3;
    p.vx = randRange(-1.5, 1.5) - Math.cos(dir) * 1;
    p.vy = randRange(-1.5, 1.5) - Math.sin(dir) * 1;
    p.life = 1;
    p.decay = randRange(0.02, 0.04);
    p.size = randRange(4, 12);
    p.color = COLORS.dust[randInt(0, COLORS.dust.length - 1)];
    p.type = 'dust';
    particleCounts.dust++;
    particleCounts.total++;
}

function updateParticles() {
    particleCounts.spark = 0;
    particleCounts.dust = 0;
    let newActive = [];

    for (let j = 0; j < activeParticleSet.length; j++) {
        let i = activeParticleSet[j];
        let p = particlePool[i];
        if (!p.active) {
            particleFreeList.push(i);
            continue;
        }

        p.x += p.vx;
        p.y += p.vy;
        p.life -= p.decay;

        if (p.type === 'dust') {
            p.size *= 1.02;
            p.vx *= 0.96;
            p.vy *= 0.96;
        }

        if (p.life <= 0) {
            p.active = false;
            particleFreeList.push(i); // Return to free list
        } else {
            newActive.push(i);
            if (p.type === 'spark') particleCounts.spark++;
            else if (p.type === 'dust') particleCounts.dust++;
        }
    }
    activeParticleSet = newActive;
    particleCounts.total = newActive.length;
}

// Menu particles
function initMenuParticles() {

// ==================== CAMERA ====================
function updateCamera() {
    if (!player) return;

    let targetAngle = -player.direction + Math.PI * 1.5;

    let angleDelta = angleDiff(camera.angle, targetAngle);
    camera.angle += angleDelta * 0.12;

    // Precompute trig values for worldToScreen
    cameraTransform.cos = Math.cos(camera.angle);
    cameraTransform.sin = Math.sin(camera.angle);

    let inputLeft = keys['ArrowLeft'] || keys['KeyA'] || touchControls.left;
    let inputRight = keys['ArrowRight'] || keys['KeyD'] || touchControls.right;
    let targetSway = 0;
    if (inputLeft) targetSway = 35;
    if (inputRight) targetSway = -35;
    camera.swayOffset += (targetSway - camera.swayOffset) * 0.06;

    camera.x = player.x;
    camera.y = player.y;

    let halfW = W / 2 / VIEW_SCALE + VIEW_MARGIN;
    let halfH = H / 2 / VIEW_SCALE + VIEW_MARGIN;
    camera.viewBounds.minX = camera.x - halfW;
    camera.viewBounds.maxX = camera.x + halfW;
    camera.viewBounds.minY = camera.y - halfH;
    camera.viewBounds.maxY = camera.y + halfH;

    // Compute visible track index range based on player position
    if (player && trackPath.length > 0) {
        let playerIdx = player.currentPathIdx;
        let viewRadius = Math.max(W, H) + VIEW_MARGIN * 2;
        // Estimate how many track points fit in the view (~1 point per 10-30 world units)
        let idxRange = Math.ceil(viewRadius / 8) + VISIBLE_RANGE_PADDING;
        visibleTrackRange.start = Math.max(0, playerIdx - idxRange);
        visibleTrackRange.end = Math.min(trackPath.length - 1, playerIdx + idxRange);
        
        // Find additional visible segments due to track folding back
        // Check segments outside the normal range that might be visible
        additionalVisibleSegments = [];
        let checkStep = 20; // Check every 20 points for efficiency
        let viewBounds = camera.viewBounds;
        let expandedMargin = VIEW_MARGIN + 100;
        
        // Check segments before visible range
        for (let i = 0; i < visibleTrackRange.start; i += checkStep) {
            let p = trackPath[i];
            if (p.x >= viewBounds.minX - expandedMargin && p.x <= viewBounds.maxX + expandedMargin &&
                p.y >= viewBounds.minY - expandedMargin && p.y <= viewBounds.maxY + expandedMargin) {
                // Found a visible segment, expand to include surrounding points
                let segStart = Math.max(0, i - checkStep);
                let segEnd = Math.min(visibleTrackRange.start - 1, i + checkStep);
                additionalVisibleSegments.push({ start: segStart, end: segEnd });
            }
        }
        
        // Check segments after visible range
        for (let i = visibleTrackRange.end + checkStep; i < trackPath.length; i += checkStep) {
            let p = trackPath[i];
            if (p.x >= viewBounds.minX - expandedMargin && p.x <= viewBounds.maxX + expandedMargin &&
                p.y >= viewBounds.minY - expandedMargin && p.y <= viewBounds.maxY + expandedMargin) {
                let segStart = Math.max(visibleTrackRange.end + 1, i - checkStep);
                let segEnd = Math.min(trackPath.length - 1, i + checkStep);
                additionalVisibleSegments.push({ start: segStart, end: segEnd });
            }
        }
    }
}

// Optimized worldToScreen - writes to provided object to avoid allocation
function worldToScreenFast(wx, wy, out) {
    let dx = wx - camera.x;
    let dy = wy - camera.y;
    out.x = W / 2 + (dx * cameraTransform.cos - dy * cameraTransform.sin) * VIEW_SCALE + camera.swayOffset;
    out.y = H * 0.6 + (dx * cameraTransform.sin + dy * cameraTransform.cos) * VIEW_SCALE;
    return out;
}

// Reusable screen point objects to avoid allocation
const screenPointCache = { x: 0, y: 0 };
const screenPointCache2 = { x: 0, y: 0 };

function worldToScreen(wx, wy) {
    return worldToScreenFast(wx, wy, screenPointCache);
}

function isInViewBounds(x, y, margin) {
    margin = margin || 0;
    return x >= camera.viewBounds.minX - margin && x <= camera.viewBounds.maxX + margin &&
           y >= camera.viewBounds.minY - margin && y <= camera.viewBounds.maxY + margin;
}

// ==================== RENDERING ====================
function drawGrass() {
    ctx.fillStyle = COLORS.grass;
    ctx.fillRect(0, 0, W, H);
}

function drawTrackSurface() {
    ctx.fillStyle = COLORS.trackSurface;
    
    // Draw main visible range
    let vStart = visibleTrackRange.start;
    let vEnd = Math.min(visibleTrackRange.end, trackLeftEdge.length - 1);
    if (vEnd > vStart) {
        ctx.beginPath();
        let wp0 = trackLeftEdge[vStart];
        let dx0 = wp0.x - camera.x;
        let dy0 = wp0.y - camera.y;
        let px0 = W / 2 + (dx0 * cameraTransform.cos - dy0 * cameraTransform.sin) * VIEW_SCALE + camera.swayOffset;
        let py0 = H * 0.6 + (dx0 * cameraTransform.sin + dy0 * cameraTransform.cos) * VIEW_SCALE;
        ctx.moveTo(px0, py0);

        for (let i = vStart + 1; i <= vEnd; i++) {
            let wp = trackLeftEdge[i];
            let dx = wp.x - camera.x;
            let dy = wp.y - camera.y;
            let px = W / 2 + (dx * cameraTransform.cos - dy * cameraTransform.sin) * VIEW_SCALE + camera.swayOffset;
            let py = H * 0.6 + (dx * cameraTransform.sin + dy * cameraTransform.cos) * VIEW_SCALE;
            ctx.lineTo(px, py);
        }

        for (let i = vEnd; i >= vStart; i--) {
            let wp = trackRightEdge[i];
            let dx = wp.x - camera.x;
            let dy = wp.y - camera.y;
            let px = W / 2 + (dx * cameraTransform.cos - dy * cameraTransform.sin) * VIEW_SCALE + camera.swayOffset;
            let py = H * 0.6 + (dx * cameraTransform.sin + dy * cameraTransform.cos) * VIEW_SCALE;
            ctx.lineTo(px, py);
        }
        ctx.closePath();
        ctx.fill();
    }
    
    // Draw additional visible segments (track folding back)
    for (let seg of additionalVisibleSegments) {
        let segStart = Math.max(0, seg.start);
        let segEnd = Math.min(trackLeftEdge.length - 1, seg.end);
        if (segEnd <= segStart) continue;
        
        ctx.beginPath();
        let swp0 = trackLeftEdge[segStart];
        let sdx0 = swp0.x - camera.x;
        let sdy0 = swp0.y - camera.y;
        let spx0 = W / 2 + (sdx0 * cameraTransform.cos - sdy0 * cameraTransform.sin) * VIEW_SCALE + camera.swayOffset;
        let spy0 = H * 0.6 + (sdx0 * cameraTransform.sin + sdy0 * cameraTransform.cos) * VIEW_SCALE;
        ctx.moveTo(spx0, spy0);

        for (let i = segStart + 1; i <= segEnd; i++) {
            let wp = trackLeftEdge[i];
            let dx = wp.x - camera.x;
            let dy = wp.y - camera.y;
            let px = W / 2 + (dx * cameraTransform.cos - dy * cameraTransform.sin) * VIEW_SCALE + camera.swayOffset;
            let py = H * 0.6 + (dx * cameraTransform.sin + dy * cameraTransform.cos) * VIEW_SCALE;
            ctx.lineTo(px, py);
        }

        for (let i = segEnd; i >= segStart; i--) {
            let wp = trackRightEdge[i];
            let dx = wp.x - camera.x;
            let dy = wp.y - camera.y;
            let px = W / 2 + (dx * cameraTransform.cos - dy * cameraTransform.sin) * VIEW_SCALE + camera.swayOffset;
            let py = H * 0.6 + (dx * cameraTransform.sin + dy * cameraTransform.cos) * VIEW_SCALE;
            ctx.lineTo(px, py);
        }
        ctx.closePath();
        ctx.fill();
    }
}

function drawBranchSurfaces() {
    ctx.fillStyle = COLORS.branchSurface;
    for (let bi = 0; bi < branchPaths.length; bi++) {
        let bp = branchPaths[bi];
        // Skip branches outside view using bounding box
        let bb = branchBounds[bi];
        if (bb && (bb.maxX < camera.viewBounds.minX || bb.minX > camera.viewBounds.maxX ||
                   bb.maxY < camera.viewBounds.minY || bb.minY > camera.viewBounds.maxY)) continue;

        // Skip fewer points since branch now extends into main track
        let skipStart = Math.min(3, Math.floor(bp.path.length * 0.05));
        let skipEnd = Math.min(3, Math.floor(bp.path.length * 0.05));
        if (bp.leftEdge.length - skipStart - skipEnd < 2) continue;
        
        ctx.beginPath();
        // First point - use the branch's actual left edge start point
        let wp0 = bp.leftEdge[skipStart];
        let dx0 = wp0.x - camera.x;
        let dy0 = wp0.y - camera.y;
        let px0 = W / 2 + (dx0 * cameraTransform.cos - dy0 * cameraTransform.sin) * VIEW_SCALE + camera.swayOffset;
        let py0 = H * 0.6 + (dx0 * cameraTransform.sin + dy0 * cameraTransform.cos) * VIEW_SCALE;
        ctx.moveTo(px0, py0);
        
        // Left edge - start from skipStart to avoid connection artifacts
        for (let i = skipStart; i < bp.leftEdge.length - skipEnd; i++) {
            let wp = bp.leftEdge[i];
            let dx = wp.x - camera.x;
            let dy = wp.y - camera.y;
            let px = W / 2 + (dx * cameraTransform.cos - dy * cameraTransform.sin) * VIEW_SCALE + camera.swayOffset;
            let py = H * 0.6 + (dx * cameraTransform.sin + dy * cameraTransform.cos) * VIEW_SCALE;
            ctx.lineTo(px, py);
        }
        
        // Right edge (reverse) - connect to track edge
        for (let i = bp.rightEdge.length - 1 - skipEnd; i >= skipStart; i--) {
            let wp = bp.rightEdge[i];
            let dx = wp.x - camera.x;
            let dy = wp.y - camera.y;
            let px = W / 2 + (dx * cameraTransform.cos - dy * cameraTransform.sin) * VIEW_SCALE + camera.swayOffset;
            let py = H * 0.6 + (dx * cameraTransform.sin + dy * cameraTransform.cos) * VIEW_SCALE;
            ctx.lineTo(px, py);
        }
        
        ctx.closePath();
        ctx.fill();
    }
}

function drawTrackEdges() {
    // This function is deprecated, use drawAllRoadEdges instead
}

function drawAllRoadEdges() {
    let edgeThickness = 4;

    ctx.strokeStyle = COLORS.trackEdge;
    ctx.lineWidth = edgeThickness * 2;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';

    // Draw main track edges - only visible range
    let vStart = visibleTrackRange.start;
    let vEnd = Math.min(visibleTrackRange.end, trackLeftEdge.length);
    drawEdgePathWithSkip(trackLeftEdge, edgeThickness, vStart, vEnd);
    drawEdgePathWithSkip(trackRightEdge, edgeThickness, vStart, vEnd);
    
    // Draw additional visible segments edges (track folding back)
    for (let seg of additionalVisibleSegments) {
        let segStart = Math.max(0, seg.start);
        let segEnd = Math.min(trackLeftEdge.length, seg.end);
        drawEdgePathWithSkip(trackLeftEdge, edgeThickness, segStart, segEnd);
        drawEdgePathWithSkip(trackRightEdge, edgeThickness, segStart, segEnd);
    }

    // Draw branch edges - now extend into main track for smooth connection
    for (let bp of branchPaths) {
        // Skip fewer points since branch now extends into main track
        let skipStart = Math.min(3, Math.floor(bp.path.length * 0.05));
        let skipEnd = Math.min(3, Math.floor(bp.path.length * 0.05));

        // Branch left edge - draw full path for smooth connection
        drawEdgePathWithSkip(bp.leftEdge, edgeThickness, skipStart, bp.leftEdge.length);

        // Branch right edge
        drawEdgePathWithSkip(bp.rightEdge, edgeThickness, 0, bp.rightEdge.length - skipEnd);
    }

    ctx.lineCap = 'butt';
    ctx.lineJoin = 'miter';
}

function drawEdgePathWithSkip(edgePoints, thickness, startIdx, endIdx) {
    if (endIdx - startIdx < 2) return;
    
    ctx.beginPath();
    let started = false;
    
    for (let i = startIdx; i < endIdx; i++) {
        let wp = edgePoints[i];
        let dx = wp.x - camera.x;
        let dy = wp.y - camera.y;
        let px = W / 2 + (dx * cameraTransform.cos - dy * cameraTransform.sin) * VIEW_SCALE + camera.swayOffset;
        let py = H * 0.6 + (dx * cameraTransform.sin + dy * cameraTransform.cos) * VIEW_SCALE;
        
        // Skip points outside view
        if (px < -100 || px > W + 100 || py < -100 || py > H + 100) {
            if (started) {
                ctx.stroke();
                ctx.beginPath();
                started = false;
            }
            continue;
        }
        
        if (!started) {
            ctx.moveTo(px, py);
            started = true;
        } else {
            ctx.lineTo(px, py);
        }
    }
    
    if (started) ctx.stroke();
}

function drawCenterLine() {
    // Two white semi-transparent solid lines along both sides of the main road (inset from edges)
    ctx.strokeStyle = 'rgba(255,255,255,0.25)';
    ctx.lineWidth = 2;

    let vStart = visibleTrackRange.start;
    let vEnd = Math.min(visibleTrackRange.end, trackPath.length - 1);
    let inset = TRACK_WIDTH * 0.38; // distance from center to each shoulder line

    // Left shoulder line - main range
    ctx.beginPath();
    for (let i = vStart; i <= vEnd; i++) {
        let wp = trackPath[i];
        let lx = wp.x + wp.nx * inset;
        let ly = wp.y + wp.ny * inset;
        let dx = lx - camera.x;
        let dy = ly - camera.y;
        let px = W / 2 + (dx * cameraTransform.cos - dy * cameraTransform.sin) * VIEW_SCALE + camera.swayOffset;
        let py = H * 0.6 + (dx * cameraTransform.sin + dy * cameraTransform.cos) * VIEW_SCALE;
        if (i === vStart) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
    }
    ctx.stroke();

    // Right shoulder line - main range
    ctx.beginPath();
    for (let i = vStart; i <= vEnd; i++) {
        let wp = trackPath[i];
        let lx = wp.x - wp.nx * inset;
        let ly = wp.y - wp.ny * inset;
        let dx = lx - camera.x;
        let dy = ly - camera.y;
        let px = W / 2 + (dx * cameraTransform.cos - dy * cameraTransform.sin) * VIEW_SCALE + camera.swayOffset;
        let py = H * 0.6 + (dx * cameraTransform.sin + dy * cameraTransform.cos) * VIEW_SCALE;
        if (i === vStart) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
    }
    ctx.stroke();
    
    // Draw shoulder lines for additional visible segments
    for (let seg of additionalVisibleSegments) {
        let segStart = Math.max(0, seg.start);
        let segEnd = Math.min(trackPath.length - 1, seg.end);
        
        // Left shoulder line
        ctx.beginPath();
        for (let i = segStart; i <= segEnd; i++) {
            let wp = trackPath[i];
            let lx = wp.x + wp.nx * inset;
            let ly = wp.y + wp.ny * inset;
            let dx = lx - camera.x;
            let dy = ly - camera.y;
            let px = W / 2 + (dx * cameraTransform.cos - dy * cameraTransform.sin) * VIEW_SCALE + camera.swayOffset;
            let py = H * 0.6 + (dx * cameraTransform.sin + dy * cameraTransform.cos) * VIEW_SCALE;
            if (i === segStart) ctx.moveTo(px, py);
            else ctx.lineTo(px, py);
        }
        ctx.stroke();

        // Right shoulder line
        ctx.beginPath();
        for (let i = segStart; i <= segEnd; i++) {
            let wp = trackPath[i];
            let lx = wp.x - wp.nx * inset;
            let ly = wp.y - wp.ny * inset;
            let dx = lx - camera.x;
            let dy = ly - camera.y;
            let px = W / 2 + (dx * cameraTransform.cos - dy * cameraTransform.sin) * VIEW_SCALE + camera.swayOffset;
            let py = H * 0.6 + (dx * cameraTransform.sin + dy * cameraTransform.cos) * VIEW_SCALE;
            if (i === segStart) ctx.moveTo(px, py);
            else ctx.lineTo(px, py);
        }
        ctx.stroke();
    }
}

function drawWalls() {
    let vStart = visibleTrackRange.start;
    let vEnd = visibleTrackRange.end;
    
    // Collect all visible ranges including additional segments
    let allVisibleRanges = [{ start: vStart, end: vEnd }];
    for (let seg of additionalVisibleSegments) {
        allVisibleRanges.push({ start: seg.start, end: seg.end });
    }
    
    for (let wall of trackWalls) {
        // Check if wall intersects any visible range
        let isVisible = false;
        for (let range of allVisibleRanges) {
            if (!(wall.endIdx < range.start || wall.startIdx > range.end)) {
                isVisible = true;
                break;
            }
        }
        if (!isVisible) continue;

        // Early exit if wall is completely outside view bounds
        let wallStartPath = trackPath[wall.startIdx];
        let wallEndPath = trackPath[Math.min(wall.endIdx, trackPath.length - 1)];
        if (!wallStartPath || !wallEndPath) continue;
        
        // Quick bounding box check against camera view
        let wallMinX = Math.min(wallStartPath.x, wallEndPath.x) - TRACK_WIDTH;
        let wallMaxX = Math.max(wallStartPath.x, wallEndPath.x) + TRACK_WIDTH;
        let wallMinY = Math.min(wallStartPath.y, wallEndPath.y) - TRACK_WIDTH;
        let wallMaxY = Math.max(wallStartPath.y, wallEndPath.y) + TRACK_WIDTH;
        
        if (wallMaxX < camera.viewBounds.minX - 100 || wallMinX > camera.viewBounds.maxX + 100 ||
            wallMaxY < camera.viewBounds.minY - 100 || wallMinY > camera.viewBounds.maxY + 100) {
            continue;
        }
        
        // Clamp iteration to visible range - find the intersecting range
        let drawStart = wall.startIdx;
        let drawEnd = wall.endIdx;
        for (let range of allVisibleRanges) {
            if (!(wall.endIdx < range.start || wall.startIdx > range.end)) {
                drawStart = Math.max(drawStart, range.start);
                drawEnd = Math.min(drawEnd, range.end);
            }
        }
        for (let i = drawStart; i < drawEnd && i < trackPath.length - 1; i++) {
            let wallThickness = 8;

            if (wall.side === 'left' || wall.side === 'both') {
                // Calculate screen coordinates inline
                let wp1 = trackLeftEdge[i];
                let wp2 = trackLeftEdge[i + 1];
                let dx1 = wp1.x - camera.x, dy1 = wp1.y - camera.y;
                let dx2 = wp2.x - camera.x, dy2 = wp2.y - camera.y;
                let l1x = W / 2 + (dx1 * cameraTransform.cos - dy1 * cameraTransform.sin) * VIEW_SCALE + camera.swayOffset;
                let l1y = H * 0.6 + (dx1 * cameraTransform.sin + dy1 * cameraTransform.cos) * VIEW_SCALE;
                let l2x = W / 2 + (dx2 * cameraTransform.cos - dy2 * cameraTransform.sin) * VIEW_SCALE + camera.swayOffset;
                let l2y = H * 0.6 + (dx2 * cameraTransform.sin + dy2 * cameraTransform.cos) * VIEW_SCALE;
                
                if (!(Math.max(l1x, l2x) < -50 || Math.min(l1x, l2x) > W + 50 ||
                      Math.max(l1y, l2y) < -50 || Math.min(l1y, l2y) > H + 50)) {
                    let p = trackPath[i];
                    let p2 = trackPath[i + 1];
                    
                    // Calculate outer wall edge
                    let wo1x = trackLeftEdge[i].x + p.nx * wallThickness;
                    let wo1y = trackLeftEdge[i].y + p.ny * wallThickness;
                    let wo2x = trackLeftEdge[i+1].x + p2.nx * wallThickness;
                    let wo2y = trackLeftEdge[i+1].y + p2.ny * wallThickness;
                    
                    let dx3 = wo1x - camera.x, dy3 = wo1y - camera.y;
                    let dx4 = wo2x - camera.x, dy4 = wo2y - camera.y;
                    let wl1x = W / 2 + (dx3 * cameraTransform.cos - dy3 * cameraTransform.sin) * VIEW_SCALE + camera.swayOffset;
                    let wl1y = H * 0.6 + (dx3 * cameraTransform.sin + dy3 * cameraTransform.cos) * VIEW_SCALE;
                    let wl2x = W / 2 + (dx4 * cameraTransform.cos - dy4 * cameraTransform.sin) * VIEW_SCALE + camera.swayOffset;
                    let wl2y = H * 0.6 + (dx4 * cameraTransform.sin + dy4 * cameraTransform.cos) * VIEW_SCALE;

                    ctx.fillStyle = COLORS.wallColor;
                    ctx.beginPath();
                    ctx.moveTo(l1x, l1y);
                    ctx.lineTo(l2x, l2y);
                    ctx.lineTo(wl2x, wl2y);
                    ctx.lineTo(wl1x, wl1y);
                    ctx.closePath();
                    ctx.fill();

                    ctx.strokeStyle = COLORS.wallEdge;
                    ctx.lineWidth = 1;
                    ctx.stroke();
                }
            }

            if (wall.side === 'right' || wall.side === 'both') {
                let wp1 = trackRightEdge[i];
                let wp2 = trackRightEdge[i + 1];
                let dx1 = wp1.x - camera.x, dy1 = wp1.y - camera.y;
                let dx2 = wp2.x - camera.x, dy2 = wp2.y - camera.y;
                let r1x = W / 2 + (dx1 * cameraTransform.cos - dy1 * cameraTransform.sin) * VIEW_SCALE + camera.swayOffset;
                let r1y = H * 0.6 + (dx1 * cameraTransform.sin + dy1 * cameraTransform.cos) * VIEW_SCALE;
                let r2x = W / 2 + (dx2 * cameraTransform.cos - dy2 * cameraTransform.sin) * VIEW_SCALE + camera.swayOffset;
                let r2y = H * 0.6 + (dx2 * cameraTransform.sin + dy2 * cameraTransform.cos) * VIEW_SCALE;
                
                if (!(Math.max(r1x, r2x) < -50 || Math.min(r1x, r2x) > W + 50 ||
                      Math.max(r1y, r2y) < -50 || Math.min(r1y, r2y) > H + 50)) {
                    let p = trackPath[i];
                    let p2t = trackPath[i + 1];
                    
                    let wo1x = trackRightEdge[i].x - p.nx * 8;
                    let wo1y = trackRightEdge[i].y - p.ny * 8;
                    let wo2x = trackRightEdge[i+1].x - p2t.nx * 8;
                    let wo2y = trackRightEdge[i+1].y - p2t.ny * 8;
                    
                    let dx3 = wo1x - camera.x, dy3 = wo1y - camera.y;
                    let dx4 = wo2x - camera.x, dy4 = wo2y - camera.y;
                    let wr1x = W / 2 + (dx3 * cameraTransform.cos - dy3 * cameraTransform.sin) * VIEW_SCALE + camera.swayOffset;
                    let wr1y = H * 0.6 + (dx3 * cameraTransform.sin + dy3 * cameraTransform.cos) * VIEW_SCALE;
                    let wr2x = W / 2 + (dx4 * cameraTransform.cos - dy4 * cameraTransform.sin) * VIEW_SCALE + camera.swayOffset;
                    let wr2y = H * 0.6 + (dx4 * cameraTransform.sin + dy4 * cameraTransform.cos) * VIEW_SCALE;

                    ctx.fillStyle = COLORS.wallColor;
                    ctx.beginPath();
                    ctx.moveTo(r1x, r1y);
                    ctx.lineTo(r2x, r2y);
                    ctx.lineTo(wr2x, wr2y);
                    ctx.lineTo(wr1x, wr1y);
                    ctx.closePath();
                    ctx.fill();

                    ctx.strokeStyle = COLORS.wallEdge;
                    ctx.lineWidth = 1;
                    ctx.stroke();
                }
            }
        }
    }
}

// Pre-allocated corners array for drawStartFinishLine
let startLineCorners = [
    { x: 0, y: 0 }, { x: 0, y: 0 }, { x: 0, y: 0 }, { x: 0, y: 0 }
];

function drawStartFinishLine(pathIdx) {
    if (pathIdx < 0 || pathIdx >= trackPath.length) return;
    let p = trackPath[pathIdx];
    let halfW = TRACK_WIDTH / 2;
    let checks = 8;
    let checkSize = TRACK_WIDTH / checks;
    let lineDepth = checkSize * 0.6;

    let pnx = p.nx, pny = p.ny, pdir = p.dir;
    let cdir = Math.cos(pdir), sdir = Math.sin(pdir);
    let camX = camera.x, camY = camera.y;
    let camCos = cameraTransform.cos, camSin = cameraTransform.sin;
    let sway = camera.swayOffset;

    for (let c = 0; c < checks; c++) {
        for (let row = 0; row < 2; row++) {
            let frac = (c + 0.5) / checks - 0.5;
            let lateral = frac * TRACK_WIDTH;
            let forward = (row - 0.5) * lineDepth;

            let wx = p.x + pnx * lateral + cdir * forward;
            let wy = p.y + pny * lateral + sdir * forward;

            let hw = checkSize * 0.5;
            let hd = lineDepth * 0.5;
            
            // Calculate corners directly into pre-allocated array
            let cx0 = wx - pnx*hw - cdir*hd, cy0 = wy - pny*hw - sdir*hd;
            let cx1 = wx + pnx*hw - cdir*hd, cy1 = wy + pny*hw - sdir*hd;
            let cx2 = wx + pnx*hw + cdir*hd, cy2 = wy + pny*hw + sdir*hd;
            let cx3 = wx - pnx*hw + cdir*hd, cy3 = wy - pny*hw + sdir*hd;
            
            // Transform to screen space
            let dx0 = cx0 - camX, dy0 = cy0 - camY;
            let dx1 = cx1 - camX, dy1 = cy1 - camY;
            let dx2 = cx2 - camX, dy2 = cy2 - camY;
            let dx3 = cx3 - camX, dy3 = cy3 - camY;
            
            startLineCorners[0].x = W / 2 + (dx0 * camCos - dy0 * camSin) * VIEW_SCALE + sway;
            startLineCorners[0].y = H * 0.6 + (dx0 * camSin + dy0 * camCos) * VIEW_SCALE;
            startLineCorners[1].x = W / 2 + (dx1 * camCos - dy1 * camSin) * VIEW_SCALE + sway;
            startLineCorners[1].y = H * 0.6 + (dx1 * camSin + dy1 * camCos) * VIEW_SCALE;
            startLineCorners[2].x = W / 2 + (dx2 * camCos - dy2 * camSin) * VIEW_SCALE + sway;
            startLineCorners[2].y = H * 0.6 + (dx2 * camSin + dy2 * camCos) * VIEW_SCALE;
            startLineCorners[3].x = W / 2 + (dx3 * camCos - dy3 * camSin) * VIEW_SCALE + sway;
            startLineCorners[3].y = H * 0.6 + (dx3 * camSin + dy3 * camCos) * VIEW_SCALE;

            let minX = Math.min(startLineCorners[0].x, startLineCorners[1].x, startLineCorners[2].x, startLineCorners[3].x);
            let maxX = Math.max(startLineCorners[0].x, startLineCorners[1].x, startLineCorners[2].x, startLineCorners[3].x);
            let minY = Math.min(startLineCorners[0].y, startLineCorners[1].y, startLineCorners[2].y, startLineCorners[3].y);
            let maxY = Math.max(startLineCorners[0].y, startLineCorners[1].y, startLineCorners[2].y, startLineCorners[3].y);
            if (maxX < -50 || minX > W + 50 || maxY < -50 || minY > H + 50) continue;

            ctx.fillStyle = (c + row) % 2 === 0 ? COLORS.startLine1 : COLORS.startLine2;
            ctx.beginPath();
            ctx.moveTo(startLineCorners[0].x, startLineCorners[0].y);
            ctx.lineTo(startLineCorners[1].x, startLineCorners[1].y);
            ctx.lineTo(startLineCorners[2].x, startLineCorners[2].y);
            ctx.lineTo(startLineCorners[3].x, startLineCorners[3].y);
            ctx.closePath();
            ctx.fill();
        }
    }
}

function drawScenery() {
    let camX = camera.x, camY = camera.y;
    let viewDist = Math.max(W, H) / 2 + VIEW_MARGIN + 200;
    let nearby = getSceneryNear(camX, camY, viewDist);
    let viewDistSq = viewDist * viewDist;
    for (let i = 0; i < nearby.length; i++) {
        let item = nearby[i];
        let ddx = item.x - camX, ddy = item.y - camY;
        // Skip scenery outside view distance (squared comparison)
        if (ddx * ddx + ddy * ddy > viewDistSq) continue;
        
        // Inline screen transform
        let dx = item.x - camera.x;
        let dy = item.y - camera.y;
        let sx = W / 2 + (dx * cameraTransform.cos - dy * cameraTransform.sin) * VIEW_SCALE + camera.swayOffset;
        let sy = H * 0.6 + (dx * cameraTransform.sin + dy * cameraTransform.cos) * VIEW_SCALE;
        
        if (sx < -200 || sx > W + 200 || sy < -200 || sy > H + 200) continue;
        if (item.type === 'tree') {
            let sz = item.size * VIEW_SCALE * 1.3;
            ctx.fillStyle = '#5D4037';
            ctx.fillRect(sx - sz*0.15, sy - sz*0.1, sz*0.3, sz*0.6);
            ctx.fillStyle = item.cachedColor || 'rgba(46,100,56,0.9)';
            ctx.beginPath(); ctx.arc(sx, sy - sz*0.3, sz*0.6, 0, Math.PI*2); ctx.fill();
        } else if (item.type === 'lake') {
            let rx = item.rx * VIEW_SCALE, ry = item.ry * VIEW_SCALE;
            let angle = item.angle + camera.angle;
            ctx.save();
            ctx.translate(sx, sy);
            ctx.rotate(angle);
            ctx.fillStyle = 'rgba(52,152,219,0.6)';
            ctx.beginPath(); ctx.ellipse(0, 0, rx, ry, 0, 0, Math.PI*2); ctx.fill();
            ctx.strokeStyle = 'rgba(41,128,185,0.5)'; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.ellipse(0, 0, rx+1, ry+1, 0, 0, Math.PI*2); ctx.stroke();
            ctx.restore();
        } else if (item.type === 'people') {
            for (let p of item.people) {
                let px = sx + p.dx * VIEW_SCALE * 1.3, py = sy + p.dy * VIEW_SCALE * 1.3;
                ctx.fillStyle = p.color;
                ctx.beginPath(); ctx.arc(px, py, 4*VIEW_SCALE, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#fdbcb4';
                ctx.beginPath(); ctx.arc(px, py - 5*VIEW_SCALE, 2.5*VIEW_SCALE, 0, Math.PI*2); ctx.fill();
            }
        }
    }
}

function drawCar(car) {
    // Inline screen transform
    let dx = car.x - camera.x;
    let dy = car.y - camera.y;
    let sx = W / 2 + (dx * cameraTransform.cos - dy * cameraTransform.sin) * VIEW_SCALE + camera.swayOffset;
    let sy = H * 0.6 + (dx * cameraTransform.sin + dy * cameraTransform.cos) * VIEW_SCALE;
    
    if (sx < -100 || sx > W + 100 || sy < -100 || sy > H + 100) return;

    let angle = car.visualAngle + camera.angle + Math.PI / 2;
    let w = car.width * VIEW_SCALE;
    let h = car.length * VIEW_SCALE;

    ctx.save();
    ctx.translate(sx, sy);
    ctx.rotate(angle);

    // Shadow
    ctx.fillStyle = COLORS.shadow;
    ctx.beginPath();
    roundRect(ctx, -w/2 + 3, -h/2 + 3, w, h, 4);
    ctx.fill();

    // Body
    ctx.fillStyle = car.color;
    ctx.beginPath();
    roundRect(ctx, -w/2, -h/2, w, h, 4);
    ctx.fill();

    // Body highlight
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.fillRect(-w/2 + 2, -h/2 + 2, w - 4, h * 0.35);

    // Windshield (front)
    ctx.fillStyle = COLORS.windshield;
    ctx.beginPath();
    roundRect(ctx, -w/2 + 3, -h/2 + h * 0.35, w - 6, h * 0.2, 2);
    ctx.fill();

    // Rear window
    ctx.fillStyle = COLORS.rearWindow;
    ctx.beginPath();
    roundRect(ctx, -w/2 + 4, h/2 - h * 0.22, w - 8, h * 0.1, 2);
    ctx.fill();

    // Headlights
    ctx.fillStyle = COLORS.headlight;
    ctx.fillRect(-w/2 + 2, -h/2, 5, 3);
    ctx.fillRect(w/2 - 7, -h/2, 5, 3);

    // Taillights
    ctx.fillStyle = COLORS.taillight;
    ctx.fillRect(-w/2 + 2, h/2 - 3, 5, 3);
    ctx.fillRect(w/2 - 7, h/2 - 3, 5, 3);

    ctx.restore();
}

function roundRect(ctx, x, y, w, h, r) {
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
}

function drawParticles() {
    for (let j = 0; j < activeParticleSet.length; j++) {
        let p = particlePool[activeParticleSet[j]];
        if (!p.active) continue;

        let dx = p.x - camera.x;
        let dy = p.y - camera.y;
        let px = W / 2 + (dx * cameraTransform.cos - dy * cameraTransform.sin) * VIEW_SCALE + camera.swayOffset;
        let py = H * 0.6 + (dx * cameraTransform.sin + dy * cameraTransform.cos) * VIEW_SCALE;

        if (px < -20 || px > W + 20 || py < -20 || py > H + 20) continue;

        ctx.globalAlpha = p.life;
        if (p.type === 'spark') {
            ctx.fillStyle = p.color;
            ctx.fillRect(px - p.size/2, py - p.size/2, p.size, p.size);
        } else {
            ctx.fillStyle = p.color;
            ctx.beginPath();
            ctx.arc(px, py, p.size * VIEW_SCALE, 0, Math.PI * 2);
            ctx.fill();
        }
    }
    ctx.globalAlpha = 1;
}

// ==================== UI (CHINESE) ====================
function drawHUD() {
    ctx.save();

    // --- Circular speed gauge ---
    let maxDisplay = 220;
    let speedVal = Math.abs(Math.round(player.speed / player.maxSpeed * maxDisplay));
    let speedPct = clamp(speedVal / maxDisplay, 0, 1);
    let gaugeR = 38;
    let gaugeCX = 16 + gaugeR + 4;
    let gaugeCY = 16 + gaugeR + 4;
    let arcStart = Math.PI * 0.75;
    let arcEnd = Math.PI * 2.25;
    let arcRange = arcEnd - arcStart;

    // Track ring background
    ctx.lineWidth = 5;
    ctx.strokeStyle = 'rgba(255,255,255,0.1)';
    ctx.beginPath();
    ctx.arc(gaugeCX, gaugeCY, gaugeR, arcStart, arcEnd);
    ctx.stroke();

    // Filled arc
    let fillEnd = arcStart + arcRange * speedPct;
    
    // Gradient color from green to red based on speed percentage
    let arcColor;
    if (speedPct < 0.5) {
        // Green to yellow gradient
        let t = speedPct * 2;
        arcColor = `rgb(${Math.floor(255 * (1 - t))}, ${255}, 0)`;
    } else {
        // Yellow to red gradient
        let t = (speedPct - 0.5) * 2;
        arcColor = `rgb(255, ${Math.floor(255 * (1 - t))}, 0)`;
    }
    ctx.strokeStyle = arcColor;
    ctx.lineWidth = 5;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.arc(gaugeCX, gaugeCY, gaugeR, arcStart, fillEnd);
    ctx.stroke();
    ctx.lineCap = 'butt';

    // Speed text centered
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 18px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(speedVal, gaugeCX, gaugeCY - 3);
    ctx.font = '9px sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.fillText('km/h', gaugeCX, gaugeCY + 13);
    ctx.textBaseline = 'alphabetic';

    // --- Home button at bottom right ---
    let btnR = 22;
    let btnX = W - 40;
    let btnY = H - 40;
    homeButtonRect = { x: btnX - btnR, y: btnY - btnR, w: btnR * 2, h: btnR * 2 };
    
    ctx.strokeStyle = 'rgba(255,255,255,0.6)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(btnX, btnY, btnR, 0, Math.PI * 2);
    ctx.stroke();
    
    // Home icon (house shape) - filled white
    ctx.fillStyle = 'rgba(255,255,255,0.8)';
    ctx.beginPath();
    ctx.moveTo(btnX, btnY - 9);
    ctx.lineTo(btnX - 10, btnY - 1);
    ctx.lineTo(btnX - 7, btnY - 1);
    ctx.lineTo(btnX - 7, btnY + 8);
    ctx.lineTo(btnX + 7, btnY + 8);
    ctx.lineTo(btnX + 7, btnY - 1);
    ctx.lineTo(btnX + 10, btnY - 1);
    ctx.closePath();
    ctx.fill();

    drawTouchControls();
    ctx.restore();
}

function drawTouchControls() {
    if (!('ontouchstart' in window)) return;
    setupTouchAreas();
    ctx.globalAlpha = 0.5;
    for (let a of touchAreas) {
        ctx.fillStyle = 'rgba(255,255,255,0.35)';
        ctx.strokeStyle = 'rgba(255,255,255,0.7)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        roundRect(ctx, a.x, a.y, a.w, a.h, 10);
        ctx.fill();
        ctx.stroke();

        ctx.fillStyle = '#fff';
        ctx.font = '20px sans-serif';
        ctx.textAlign = 'center';
        let labels = { up: '▲', down: '▼', left: '◄', right: '►' };
        ctx.fillText(labels[a.id], a.x + a.w / 2, a.y + a.h / 2 + 7);
    }
    ctx.globalAlpha = 1;
}

function formatTime(t) {
    let mins = Math.floor(t / 60);
    let secs = Math.floor(t % 60);
    let ms = Math.floor((t % 1) * 100);
    return String(mins).padStart(2, '0') + ':' + String(secs).padStart(2, '0') + '.' + String(ms).padStart(2, '0');
}

// ==================== MINIMAP ====================
// Pre-render static track onto offscreen canvas (drawn once per track generation)
let minimapStaticCanvas = null;
let minimapStaticCtx = null;
const MINIMAP_SIZE = 140;

function prerenderMinimapTrack() {
    let dpr = window.devicePixelRatio || 1;
    minimapStaticCanvas = document.createElement('canvas');
    minimapStaticCanvas.width = MINIMAP_SIZE * dpr;
    minimapStaticCanvas.height = MINIMAP_SIZE * dpr;
    minimapStaticCtx = minimapStaticCanvas.getContext('2d');
    minimapStaticCtx.scale(dpr, dpr);

    let mctx = minimapStaticCtx;
    let mb = minimapBounds;
    let scale = mb.scale;
    let cx = mb.cx, cy = mb.cy;
    let halfMap = MINIMAP_SIZE / 2;

    // Clear
    mctx.clearRect(0, 0, MINIMAP_SIZE, MINIMAP_SIZE);

    // Draw main track - thicker lines for clarity
    mctx.strokeStyle = 'rgba(255,255,255,0.45)';
    mctx.lineWidth = 3;
    mctx.beginPath();
    for (let i = 0; i < trackPath.length; i += 2) {
        let px = halfMap + (trackPath[i].x - cx) * scale;
        let py = halfMap + (trackPath[i].y - cy) * scale;
        if (i === 0) mctx.moveTo(px, py);
        else mctx.lineTo(px, py);
    }
    mctx.stroke();

    // Draw branches - thicker
    mctx.strokeStyle = 'rgba(255,180,80,0.55)';
    mctx.lineWidth = 2.5;
    for (let bp of branchPaths) {
        mctx.beginPath();
        for (let i = 0; i < bp.path.length; i += 2) {
            let px = halfMap + (bp.path[i].x - cx) * scale;
            let py = halfMap + (bp.path[i].y - cy) * scale;
            if (i === 0) mctx.moveTo(px, py);
            else mctx.lineTo(px, py);
        }
        mctx.stroke();
    }

    // Start marker (green)
    let spx = halfMap + (trackPath[0].x - cx) * scale;
    let spy = halfMap + (trackPath[0].y - cy) * scale;
    mctx.fillStyle = '#2ecc71';
    mctx.beginPath();
    mctx.arc(spx, spy, 5, 0, Math.PI * 2);
    mctx.fill();

    // Finish marker (checkered)
    let fpx = halfMap + (trackPath[trackPath.length - 1].x - cx) * scale;
    let fpy = halfMap + (trackPath[trackPath.length - 1].y - cy) * scale;
    mctx.fillStyle = '#ffffff';
    mctx.beginPath();
    mctx.arc(fpx, fpy, 5, 0, Math.PI * 2);
    mctx.fill();
    mctx.fillStyle = '#111';
    mctx.beginPath();
    mctx.arc(fpx, fpy, 2.5, 0, Math.PI * 2);
    mctx.fill();
}

function drawMinimap() {
    let mapSize = MINIMAP_SIZE;
    let mapX = W - mapSize - 16;
    let mapY = 16;

    // Background (transparent)
    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    roundRect(ctx, mapX, mapY, mapSize, mapSize, 14);
    ctx.stroke();

    // Blit pre-rendered static track (hi-res)
    if (minimapStaticCanvas) {
        ctx.drawImage(minimapStaticCanvas, 0, 0, minimapStaticCanvas.width, minimapStaticCanvas.height, mapX, mapY, mapSize, mapSize);
    }

    let mb = minimapBounds;
    let scale = mb.scale;
    let cx = mb.cx, cy = mb.cy;
    let halfMap = mapSize / 2;

    // Player dot only
    if (player) {
        let mpx = mapX + halfMap + (player.x - cx) * scale;
        let mpy = mapY + halfMap + (player.y - cy) * scale;
        ctx.fillStyle = COLORS.minimapPlayer;
        ctx.beginPath();
        ctx.arc(mpx, mpy, 4, 0, Math.PI * 2);
        ctx.fill();

        // Direction indicator
        ctx.strokeStyle = COLORS.minimapPlayer;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(mpx, mpy);
        ctx.lineTo(mpx + Math.cos(player.direction) * 8, mpy + Math.sin(player.direction) * 8);
        ctx.stroke();
    }
}
